<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>20nagar Food Xpress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e53935">
<link rel="icon" href="company-logo.png">

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }

/* HEADER */
.header {
  background:#000;
  color:#fff;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo { font-weight:bold; color:#ff9800; }
.cart { font-size:20px; }

/* LOCATION */
.location {
  padding:10px;
  background:#fff;
  font-weight:500;
}

/* BANNER */
.banner {
  margin:10px;
  padding:15px;
  border-radius:12px;
  background:linear-gradient(90deg,#ff3d00,#ff9800);
  color:#fff;
}

/* SEARCH */
.search-box {
  margin:10px;
  display:flex;
}
.search-box input {
  flex:1;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}
.search-box button {
  margin-left:5px;
  padding:10px;
  background:#ff5722;
  color:#fff;
  border:none;
  border-radius:8px;
}

/* CATEGORY */
.categories {
  display:flex;
  overflow:auto;
  padding:10px;
}
.cat {
  background:#fff;
  padding:10px;
  margin-right:10px;
  border-radius:10px;
  white-space:nowrap;
}

/* RESTAURANTS */
.section-title {
  padding:10px;
  font-weight:bold;
}

.restaurants {
  display:flex;
  overflow:auto;
  padding:10px;
}

.card {
  background:#fff;
  border-radius:12px;
  margin-right:10px;
  width:150px;
  padding:10px;
  cursor:pointer;
}

.card img {
  width:100%;
  border-radius:10px;
}

/* BOTTOM NAV */
.bottom {
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  color:#fff;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}
</style>

</head>

<body>

<!-- HEADER -->

<div class="header">
  <div class="logo">20NAGAR XPRESS</div>
  <div class="cart">🛒</div>
</div>

<!-- LOCATION -->

<div class="location">
  Delivering to: Food Nagar
</div>

<!-- BANNER -->

<div class="banner">
  <b>CRAVING DELIVERED 🚀</b><br>
  ₹1 Delivery • Same price as restaurant
</div>

<!-- SEARCH -->

<div class="search-box">
  <input id="search" placeholder="Search restaurant or item...">
  <button onclick="search()">Search</button>
</div>

<!-- SECTION 1 -->

<div class="section-title">🔥 Best Price Guaranteed</div>
<div class="restaurants" id="priceMatch"></div>

<div style="padding:0 10px; text-align:right;">
  <button>See All →</button>
</div>


<!-- SECTION 2 -->

<div class="section-title">🍽 Popular Restaurants</div>
<div class="restaurants" id="normal"></div>

<div style="padding:0 10px; text-align:right;">
  <button>See All →</button>
</div>


<!-- SECTION 3 -->

<div class="section-title">⏱ Currently Closed</div>
<div class="restaurants" id="closed"></div>

<div style="padding:0 10px; text-align:right;">
  <button>See All →</button>
</div>
  
<!-- BOTTOM NAV -->

<div class="bottom">
  <div>Home</div>
  <div>Search</div>
  <div>Orders</div>
  <div>Profile</div>
</div>

<script>
// 🔥 SUPABASE CONFIG
  const SUPABASE_URL = "https://zozzoqzryejpkbddzoyi.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpvenpvcXpyeWVqcGtiZGR6b3lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NDMwNzIsImV4cCI6MjA5MTUxOTA3Mn0.RYQqP5mVTtga4Y1XsBTRs_o58Bj2gSLZ5Se6YMak-UE";

// DATA
let restaurants = [
  {id:1, name:"Pizza Hub", image:"company-logo.png", price_match:true, is_open:true},
  {id:2, name:"Burger King", image:"company-logo.png", price_match:true, is_open:true},
  {id:3, name:"Cake World", image:"company-logo.png", price_match:false, is_open:true},
  {id:4, name:"Biryani House", image:"company-logo.png", price_match:false, is_open:true},
  {id:5, name:"Thali Center", image:"company-logo.png", price_match:false, is_open:false},
  {id:6, name:"Snack Corner", image:"company-logo.png", price_match:false, is_open:false}
];
  
// LOAD DATA
function render(){
function shuffle(arr){
  return arr.sort(() => Math.random() - 0.5);
}

let priceMatch = shuffle(restaurants.filter(r => r.price_match && r.is_open));
let normal = shuffle(restaurants.filter(r => !r.price_match && r.is_open));
let closed = shuffle(restaurants.filter(r => !r.is_open));
  
  document.getElementById("priceMatch").innerHTML =
    priceMatch.slice(0,4).map(card).join("");

  document.getElementById("normal").innerHTML =
    normal.slice(0,4).map(card).join("");

  document.getElementById("closed").innerHTML =
    closed.slice(0,4).map(card).join("");
}

function card(r){
  return `
    <div class="card" 
      onclick="${r.is_open ? `openMenu('${r.id}')` : ''}"
      style="${!r.is_open ? 'opacity:0.5;' : ''}">

      <img src="${r.image}">
      <div>${r.name}</div>

      ${!r.is_open ? `<div style="color:red; font-size:12px;">Closed</div>` : ''}
    </div>
  `;
}
  
render();
  

// OPEN MENU
function openMenu(id){
  localStorage.setItem("restaurant", id);
  window.location.href = "index.html";
}

// SEARCH
function search(){
  const q = document.getElementById("search").value.toLowerCase();

  let filtered = restaurants.filter(r =>
    (r.name || "").toLowerCase().includes(q)
  );

  document.getElementById("priceMatch").innerHTML = "";
  document.getElementById("normal").innerHTML =
    filtered.map(card).join("");
  document.getElementById("closed").innerHTML = "";
}

</script>

</body>
</html>
