<!DOCTYPE html>
<html>

<meta charset="UTF-8">
<title>20nagar Food Xpress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e53935">
<link rel="icon" href="company-logo.png">

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }

/* HEADER */
.header {
  background:#000;
  color:#fff;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo { font-weight:bold; color:#ff9800; }
.cart { font-size:20px; }

/* LOCATION */
.location {
  padding:10px;
  background:#fff;
  font-weight:500;
}

/* BANNER */
.banner {
  margin:10px;
  padding:15px;
  border-radius:12px;
  background:linear-gradient(90deg,#ff3d00,#ff9800);
  color:#fff;
}

/* SEARCH */
.search-box {
  margin:10px;
  display:flex;
}
.search-box input {
  flex:1;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}
.search-box button {
  margin-left:5px;
  padding:10px;
  background:#ff5722;
  color:#fff;
  border:none;
  border-radius:8px;
}

/* CATEGORY */
.categories {
  display:flex;
  overflow:auto;
  padding:10px;
}
.cat {
  background:#fff;
  padding:10px;
  margin-right:10px;
  border-radius:10px;
  white-space:nowrap;
}

/* RESTAURANTS */
.section-title {
  padding:10px;
  font-weight:bold;
}

.restaurants {
  display:flex;
  overflow-x:auto;
  padding:10px;
  gap:10px;
}
  
.card {
  background:#fff;
  border-radius:14px;
  margin-right:10px;
  width:160px;
  padding:10px;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}
  
.card img {
  width:100%;
  height:100px;
  object-fit:cover;
  border-radius:10px;
}
  
/* BOTTOM NAV */
.bottom {
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  color:#fff;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}
</style>

</head>

<body>

<!-- HEADER -->

<div class="header">
  <div class="logo">20NAGAR XPRESS</div>
  <div class="cart">🛒</div>
</div>

<!-- LOCATION -->

<div class="location">
  Delivering to: Food Nagar
</div>

<!-- BANNER -->

<div class="banner">
  <b>CRAVING DELIVERED 🚀</b><br>
  ₹1 Delivery • Same price as restaurant
</div>

<!-- SEARCH -->

<div class="search-box">
  <input id="search" placeholder="Search restaurant or item...">
  <button onclick="search()">Search</button>
</div>

<!-- SECTION 1 -->

<div style="display:flex;justify-content:space-between;align-items:center;padding:0 10px;">
  <div class="section-title">🔥 Best Price Guaranteed</div>
  <button onclick="openList('price')">See All →</button>
</div>

<div class="restaurants" id="priceMatch"></div>
  

<!-- SECTION 2 -->

<div style="display:flex;justify-content:space-between;align-items:center;padding:0 10px;">
  <div class="section-title">🍽 Popular Restaurants</div>
  <button onclick="openList('normal')">See All →</button>
</div>

<div class="restaurants" id="normal"></div>
  

<!-- SECTION 3 -->

<div style="display:flex;justify-content:space-between;align-items:center;padding:0 10px;">
  <div class="section-title">⏱ Currently Closed</div>
  <button onclick="openList('closed')">See All →</button>
</div>

<div class="restaurants" id="closed"></div>
  
  
<!-- BOTTOM NAV -->

<div class="bottom">
  <div>Home</div>
  <div>Search</div>
  <div>Orders</div>
  <div>Profile</div>
</div>

<script>
// 🔥 SUPABASE CONFIG
  const SUPABASE_URL = "https://zozzoqzryejpkbddzoyi.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpvenpvcXpyeWVqcGtiZGR6b3lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NDMwNzIsImV4cCI6MjA5MTUxOTA3Mn0.RYQqP5mVTtga4Y1XsBTRs_o58Bj2gSLZ5Se6YMak-UE";

// DATA
let restaurants = [
  {id:1,name:"Pizza Hub",price_match:true,is_open:true,image:"company-logo.png"},
  {id:2,name:"Burger King",price_match:true,is_open:true,image:"company-logo.png"},
  {id:3,name:"Cake World",price_match:false,is_open:true,image:"company-logo.png"},
  {id:4,name:"Biryani House",price_match:false,is_open:true,image:"company-logo.png"},
  {id:5,name:"Thali Center",price_match:false,is_open:false,image:"company-logo.png"},
  {id:6,name:"Snack Corner",price_match:false,is_open:false,image:"company-logo.png"}, // ✅ ADD THIS
];

// LOAD DATA
function render(){
function shuffle(arr){
  return arr.sort(() => Math.random() - 0.5);
}

let priceMatch = shuffle(restaurants.filter(r => r.price_match && r.is_open));
let normal = shuffle(restaurants.filter(r => !r.price_match && r.is_open));
let closed = shuffle(restaurants.filter(r => !r.is_open));
  
  document.getElementById("priceMatch").innerHTML =
    priceMatch.slice(0,4).map(card).join("");

  document.getElementById("normal").innerHTML =
    normal.slice(0,4).map(card).join("");

  document.getElementById("closed").innerHTML =
    closed.slice(0,4).map(card).join("");
}

function card(r){

  const vegDot = r.veg_type === "veg"
    ? `<span style="color:green;">●</span>`
    : `<span style="color:red;">●</span>`;

  return `
    <div class="card"
      onclick="${r.is_open ? `openMenu('${r.id}')` : 'return false'}"
      style="${!r.is_open ? 'opacity:0.5;' : ''}">

      <img src="${r.image || 'company-logo.png'}" loading="lazy">

      <div style="font-weight:600; margin-top:5px;">
        ${vegDot} ${r.name}
      </div>

      <div style="font-size:12px; color:#666;">
        ${r.tag_line || ""}
      </div>

      <div style="font-size:12px; margin-top:4px;">
        ${
          r.is_open
          ? `<span style="color:green;">Open</span> • ${r.open_time} - ${r.close_time}`
          : `<span style="color:red;">Closed</span>`
        }
      </div>

    </div>
  `;
}
function openList(type){
  localStorage.setItem("listType", type);
  window.location.href = "list.html";
}

  
render();


// OPEN MENU
function openMenu(id){
  localStorage.setItem("restaurant", id);
  window.location.href = "menu.html";
}

// SEARCH
function search(){
  const q = document.getElementById("search").value.toLowerCase();

  let filtered = restaurants.filter(r =>
    (r.name || "").toLowerCase().includes(q)
  );

  document.getElementById("priceMatch").innerHTML = "";
  document.getElementById("normal").innerHTML =
    filtered.map(card).join("");
  document.getElementById("closed").innerHTML = "";
}

</script>

</body>
</html>
