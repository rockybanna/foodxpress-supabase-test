<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>20nagar Food Xpress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e53935">
<link rel="icon" href="company-logo.png">

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }

  .section {
  margin-bottom:20px;
}
  
  .section-row {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 12px;
  margin-top:10px;
}

.section-title {
  font-size:16px;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:6px;
}
  
.section-row button {
  font-size:13px;
  padding:6px 10px;
  border-radius:8px;
  border:1px solid #ddd;
  background:#fff;
}

/* HEADER */
.header {
  background:#000;
  color:#fff;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo { font-weight:bold; color:#ff9800; }
.cart { font-size:20px; }

/* LOCATION */
.location {
  padding:10px;
  background:#fff;
  font-weight:500;
}

/* BANNER */
.banner {
  margin:10px;
  padding:15px;
  border-radius:12px;
  background:linear-gradient(90deg,#ff3d00,#ff9800);
  color:#fff;
}

/* SEARCH */
.search-box {
  margin:10px;
  display:flex;
}
.search-box input {
  flex:1;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}
.search-box button {
  margin-left:5px;
  padding:10px;
  background:#ff5722;
  color:#fff;
  border:none;
  border-radius:8px;
}

/* CATEGORY */
.categories {
  display:flex;
  overflow:auto;
  padding:10px;
}
.cat {
  background:#fff;
  padding:10px;
  margin-right:10px;
  border-radius:10px;
  white-space:nowrap;
}

/* RESTAURANTS */

.restaurants {
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  padding:10px;
}
  .page {
  min-width:100%;
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:12px;
  scroll-snap-align:start;
}
  
.card {
  width:100%;
  background:#fff;
  border-radius:12px;
  padding:8px;
  box-sizing:border-box;
}
  
  .card img {
  width:100%;
  height:80px;
  object-fit:cover;
  border-radius:10px;
}
  
/* BOTTOM NAV */
.bottom {
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  color:#fff;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

  .fbtn {
  padding:6px 12px;
  border-radius:20px;
  border:1px solid #ddd;
  background:#fff;
  cursor:pointer;
}

.fbtn.active {
  background:#ff5722;
  color:#fff;
  border:none;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">
  <div class="logo">20NAGAR XPRESS</div>
  <div class="cart" onclick="openCart()">🛒</div>
</div>

<!-- LOCATION -->

<div class="location">
  Delivering to: Food Nagar
</div>

<!-- BANNER -->

<div class="banner">
  <b>CRAVING DELIVERED 🚀</b><br>
  ₹1 Delivery • Same price as restaurant
</div>

<!-- SEARCH -->

<div class="search-box">
  <input id="search" placeholder="Search restaurant or item...">
  <button onclick="search()">Search</button>
</div>

<!-- ✅ VEG TOGGLE -->
<div style="display:flex; gap:10px; padding:0 10px; margin-top:5px;">
  <button id="f_all" onclick="setFilter('all')" class="fbtn">All</button>
  <button id="f_veg" onclick="setFilter('veg')" class="fbtn">🟢 Veg</button>
  <button id="f_nonveg" onclick="setFilter('nonveg')" class="fbtn">🔴 Non-Veg</button>
</div>
  
<!-- SECTION 1 -->

<div class="section">

  <div class="section-row">
    <div class="section-title">🔥 Best Price Guaranteed</div>
    <button onclick="openList('price')">See All →</button>
  </div>

  <div id="priceMatch" class="restaurants"></div>

</div>  

<!-- SECTION 2 -->
  
<div class="section">

  <div class="section-row">
    <div class="section-title">🍽 Popular Restaurants</div>
    <button onclick="openList('normal')">See All →</button>
  </div>

  <div id="normal" class="restaurants"></div>

</div>  

<!-- SECTION 3 -->

  <div class="section">

  <div class="section-row">
    <div class="section-title">⏱ Currently Closed</div>
    <button onclick="openList('closed')">See All →</button>
  </div>

  <div id="closed" class="restaurants"></div>

</div>  
  
<!-- BOTTOM NAV -->

<div class="bottom">
  <div>Home</div>
  <div>Search</div>
  <div>Orders</div>
  <div>Profile</div>
</div>

<script>
// 🔥 SUPABASE CONFIG
  const SUPABASE_URL = "https://zozzoqzryejpkbddzoyi.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpvenpvcXpyeWVqcGtiZGR6b3lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NDMwNzIsImV4cCI6MjA5MTUxOTA3Mn0.RYQqP5mVTtga4Y1XsBTRs_o58Bj2gSLZ5Se6YMak-UE";
const headers = {
  apikey: SUPABASE_KEY,
  Authorization: `Bearer ${SUPABASE_KEY}`
};

let currentFilter = "all";
  let restaurants = [];

  
// LOAD DATA
function render(){
function shuffle(arr){
  return arr.sort(() => Math.random() - 0.5);
}

function applyFilter(list){
  if(currentFilter === "veg"){
    return list.filter(r => r.food_type === "veg");
  }
  if(currentFilter === "nonveg"){
    return list.filter(r => r.food_type === "nonveg");
  }
  return list;
}

let priceMatch = shuffle(
  applyFilter(restaurants.filter(r => r.commission == 10 && r.is_active))
);

let normal = shuffle(
  applyFilter(restaurants.filter(r => r.commission != 10 && r.is_active))
);

let closed = shuffle(
  applyFilter(restaurants.filter(r => !r.is_active))
);
  
document.getElementById("priceMatch").innerHTML =
  buildPages(priceMatch);

document.getElementById("normal").innerHTML =
  buildPages(normal);

document.getElementById("closed").innerHTML =
  buildPages(closed);
}

function setFilter(type){
  currentFilter = type;

  document.querySelectorAll(".fbtn").forEach(b => b.classList.remove("active"));

  document.getElementById("f_" + type).classList.add("active");

  function buildPages(list){
  let pages = [];

  for(let i = 0; i < list.length; i += 6){
    let chunk = list.slice(i, i + 6);

    pages.push(`
      <div class="page">
        ${chunk.map(card).join("")}
      </div>
    `);
  }

  return pages.join("");
}

  render();
}
  
function card(r){

const vegDot =
  r.food_type === "veg"
    ? `<span style="color:green;">●</span>`
    : r.food_type === "nonveg"
    ? `<span style="color:red;">●</span>`
    : `<span style="color:green;">●</span><span style="color:red;">●</span>`;
  
  return `
    <div class="card"
      onclick="openMenu('${r.id}')"
      style="${!r.is_active ? 'opacity:0.5;' : ''}">

      <img src="${r.image || 'company-logo.png'}" loading="lazy">

      <div style="font-size:13px;font-weight:600;margin-top:5px;">
        ${vegDot} ${r.name}
      </div>

      <div style="font-size:12px; color:#666;">
        ${r.tag_line || ""}
      </div>

      <div style="font-size:11px;margin-top:4px;">
        ${
          r.is_active
          ? `<span style="color:green;">Open</span> • ${r.open_time} - ${r.close_time}`
          : `<span style="color:red;">Closed</span>`
        }
      </div>

    </div>
  `;
}
function openList(type){
  localStorage.setItem("listType", type);
  window.location.href = "list.html";
}

// OPEN MENU
function openMenu(id){
  localStorage.setItem("restaurant", id);
  window.location.href = "menu.html";
}

  function openCart(){
  window.location.href = "cart.html";
}

// SEARCH
function search(){
  const q = document.getElementById("search").value.toLowerCase();

  let filtered = restaurants.filter(r =>
    (r.name || "").toLowerCase().includes(q)
  );

  document.getElementById("priceMatch").innerHTML = "";
  document.getElementById("normal").innerHTML =
    filtered.map(card).join("");
  document.getElementById("closed").innerHTML = "";
}

async function loadRestaurants(){

  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/restaurants`,
    { headers }
  );

  restaurants = await res.json();

  render();
}
  
  loadRestaurants();
document.getElementById("f_all").classList.add("active");
  
</script>

</body>
</html>
