<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>20nagar Food Xpress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e53935">
<link rel="icon" href="company-logo.png">

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }

/* HEADER */
.header {
  background:#000;
  color:#fff;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo { font-weight:bold; color:#ff9800; }
.cart { font-size:20px; }

/* LOCATION */
.location {
  padding:10px;
  background:#fff;
  font-weight:500;
}

/* BANNER */
.banner {
  margin:10px;
  padding:15px;
  border-radius:12px;
  background:linear-gradient(90deg,#ff3d00,#ff9800);
  color:#fff;
}

/* SEARCH */
.search-box {
  margin:10px;
  display:flex;
}
.search-box input {
  flex:1;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}
.search-box button {
  margin-left:5px;
  padding:10px;
  background:#ff5722;
  color:#fff;
  border:none;
  border-radius:8px;
}

/* CATEGORY */
.categories {
  display:flex;
  overflow:auto;
  padding:10px;
}
.cat {
  background:#fff;
  padding:10px;
  margin-right:10px;
  border-radius:10px;
  white-space:nowrap;
}

/* RESTAURANTS */
.section-title {
  padding:10px;
  font-weight:bold;
}

.restaurants {
  display:flex;
  overflow:auto;
  padding:10px;
}

.card {
  background:#fff;
  border-radius:12px;
  margin-right:10px;
  width:150px;
  padding:10px;
  cursor:pointer;
}

.card img {
  width:100%;
  border-radius:10px;
}

/* BOTTOM NAV */
.bottom {
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  color:#fff;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}
</style>

</head>

<body>

<!-- HEADER -->

<div class="header">
  <div class="logo">20NAGAR XPRESS</div>
  <div class="cart">🛒</div>
</div>

<!-- LOCATION -->

<div class="location">
  Delivering to: Food Nagar
</div>

<!-- BANNER -->

<div class="banner">
  <b>CRAVING DELIVERED 🚀</b><br>
  ₹1 Delivery • Same price as restaurant
</div>

<!-- SEARCH -->

<div class="search-box">
  <input id="search" placeholder="Search restaurant or item...">
  <button onclick="search()">Search</button>
</div>

<!-- CATEGORIES -->

<div class="categories" id="categories"></div>

<!-- RESTAURANTS -->

<div class="section-title">POPULAR NEAR YOU</div>
<div class="restaurants" id="restaurants"></div>

<!-- BOTTOM NAV -->

<div class="bottom">
  <div>Home</div>
  <div>Search</div>
  <div>Orders</div>
  <div>Profile</div>
</div>

<script>
// 🔥 SUPABASE CONFIG
  const SUPABASE_URL = "https://zozzoqzryejpkbddzoyi.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpvenpvcXpyeWVqcGtiZGR6b3lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NDMwNzIsImV4cCI6MjA5MTUxOTA3Mn0.RYQqP5mVTtga4Y1XsBTRs_o58Bj2gSLZ5Se6YMak-UE";

// DATA
let restaurants = [];
let categories = [];

// LOAD DATA
async function load(){

  // restaurants
  let r = await fetch(`${SUPABASE_URL}/rest/v1/restaurants`,{
    headers:{apikey:SUPABASE_KEY}
  });
  restaurants = await r.json();

  // categories
  let c = await fetch(`${SUPABASE_URL}/rest/v1/categories`,{
    headers:{apikey:SUPABASE_KEY}
  });
  categories = await c.json();

  render();
}

function render(){

  // categories
  document.getElementById("categories").innerHTML =
    categories.map(c=>`
      <div class="cat">${c.CategoryName}</div>
    `).join("");

  // restaurants
  document.getElementById("restaurants").innerHTML =
    restaurants.map(r=>`
      <div class="card" onclick="openMenu('${r.id}')">
        <img src="${r.Image || 'company-logo.png'}">
        <div>${r.RestaurantName}</div>
      </div>
    `).join("");
}

// OPEN MENU
function openMenu(id){
  localStorage.setItem("restaurant", id);
  window.location.href = "menu.html";
}

// SEARCH
function search(){
  const q = document.getElementById("search").value.toLowerCase();

  document.getElementById("restaurants").innerHTML =
    restaurants
      .filter(r => r.RestaurantName.toLowerCase().includes(q))
      .map(r=>`
        <div class="card" onclick="openMenu('${r.id}')">
          <img src="${r.Image || 'company-logo.png'}">
          <div>${r.RestaurantName}</div>
        </div>
      `).join("");
}

// INIT
load();
</script>

</body>
</html>
