<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>All Restaurants</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }

.header {
  background:#000;
  color:#fff;
  padding:12px;
  display:flex;
  align-items:center;
}
.back { margin-right:10px; cursor:pointer; }
.title { color:#ff9800; font-weight:bold; }

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#fff;
  border-radius:12px;
  padding:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img {
  width:100%;
  height:100px;
  object-fit:cover;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="back" onclick="goBack()">⬅</div>
  <div class="title">Restaurants</div>
</div>

<div class="grid" id="list"></div>

<script>

// SAME DATA (for now)
let restaurants = [
  {id:1,name:"Pizza Hub",price_match:true,is_open:true,image:"company-logo.png"},
  {id:2,name:"Burger King",price_match:true,is_open:true,image:"company-logo.png"},
  {id:3,name:"Cake World",price_match:false,is_open:true,image:"company-logo.png"},
  {id:4,name:"Biryani House",price_match:false,is_open:true,image:"company-logo.png"},
  {id:5,name:"Thali Center",price_match:false,is_open:false,image:"company-logo.png"},
];

// GET TYPE
let type = localStorage.getItem("listType");

// FILTER
let list = [];

if(type === "price"){
  list = restaurants.filter(r => r.price_match && r.is_open);
}
if(type === "normal"){
  list = restaurants.filter(r => !r.price_match && r.is_open);
}
if(type === "closed"){
  list = restaurants.filter(r => !r.is_open);
}

// RENDER
document.getElementById("list").innerHTML =
  list.map(r => `
    <div class="card" onclick="openMenu('${r.id}')">
      <img src="${r.image}">
      <div>${r.name}</div>
    </div>
  `).join("");

function openMenu(id){
  localStorage.setItem("restaurant", id);
  window.location.href = "menu.html";
}

function goBack(){
  window.location.href = "index.html";
}

</script>

</body>
</html>
