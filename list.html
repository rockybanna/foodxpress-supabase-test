<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>All Restaurants</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }

.header {
  background:#000;
  color:#fff;
  padding:12px;
  display:flex;
  align-items:center;
}
.back { margin-right:10px; cursor:pointer; }
.title { color:#ff9800; font-weight:bold; }

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
}
  
.card {
  background:#fff;
  border-radius:14px;
  padding:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
  transition:0.2s;
}
  
.card img {
  width:100%;
  height:110px;
  object-fit:cover;
  border-radius:12px;
}

</style>
</head>

<body>

<div class="header">
  <div class="back" onclick="goBack()">⬅</div>
  <div class="title" id="title"></div>
</div>

<div class="grid" id="list"></div>

<script>

// SAME DATA (for now)
let restaurants = [
  {id:1,name:"Pizza Hub",price_match:true,is_open:true,image:"company-logo.png"},
  {id:2,name:"Burger King",price_match:true,is_open:true,image:"company-logo.png"},
  {id:3,name:"Cake World",price_match:false,is_open:true,image:"company-logo.png"},
  {id:4,name:"Biryani House",price_match:false,is_open:true,image:"company-logo.png"},
  {id:5,name:"Thali Center",price_match:false,is_open:false,image:"company-logo.png"},
  {id:6,name:"Snack Corner",price_match:false,is_open:false,image:"company-logo.png"},
];

// GET TYPE

  let type = localStorage.getItem("listType");

// 👇 ADD THIS HERE
if(type === "price"){
  document.getElementById("title").innerText = "Best Price Guaranteed";
}
if(type === "normal"){
  document.getElementById("title").innerText = "Popular Restaurants";
}
if(type === "closed"){
  document.getElementById("title").innerText = "Currently Closed";
}

// FILTER
let list = [];

if(type === "price"){
  list = restaurants.filter(r => r.price_match && r.is_open);
}
if(type === "normal"){
  list = restaurants.filter(r => !r.price_match && r.is_open);
}
if(type === "closed"){
  list = restaurants.filter(r => !r.is_open);
}

// RENDER
document.getElementById("list").innerHTML =
  list.map(r => `
  <div class="card"
    onclick="${r.is_open ? `openMenu('${r.id}')` : ''}"
    style="${!r.is_open ? 'opacity:0.6;' : ''}">

    <img src="${r.image}">

    <div style="font-weight:600; margin-top:6px;">
      ${r.name}
    </div>

    ${!r.is_open ? `
      <div style="color:red; font-size:12px;">
        Closed
      </div>
    ` : ``}

  </div>
`).join("");

  
function openMenu(id){
  localStorage.setItem("restaurant", id);
  window.location.href = "menu.html";
}

function goBack(){
  window.location.href = "index.html";
}

</script>

</body>
</html>
