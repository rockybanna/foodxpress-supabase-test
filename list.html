<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>All Restaurants</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }

.header {
  background:#000;
  color:#fff;
  padding:12px;
  display:flex;
  align-items:center;
}
.back { margin-right:10px; cursor:pointer; }
.title { color:#ff9800; font-weight:bold; }

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
}
  
.card {
  background:#fff;
  border-radius:14px;
  padding:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
  transition:0.2s;
  cursor:pointer;
}
  
.card img {
  width:100%;
  height:110px;
  object-fit:cover;
  border-radius:12px;
}
</style>

</head>

<body>

<div class="header">
  <div class="back" onclick="goBack()">⬅</div>
  <div class="title" id="title">Restaurants</div>
</div>

<div class="grid" id="list"></div>

<script>

// 🔥 SUPABASE CONFIG
const SUPABASE_URL = "https://zozzoqzryejpkbddzoyi.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpvenpvcXpyeWVqcGtiZGR6b3lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NDMwNzIsImV4cCI6MjA5MTUxOTA3Mn0.RYQqP5mVTtga4Y1XsBTRs_o58Bj2gSLZ5Se6YMak-UE";

const headers = {
  apikey: SUPABASE_KEY,
  Authorization: `Bearer ${SUPABASE_KEY}`
};

let restaurants = [];

// LOAD DATA
async function loadRestaurants(){

  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/restaurants`,
    { headers }
  );

  restaurants = await res.json();

  renderList();
}

// RENDER
function renderList(){

  document.getElementById("list").innerHTML =
    restaurants.map(r => `
      <div class="card" onclick="openMenu('${r.id}')">

        <img src="${r.image || 'company-logo.png'}">

        <div style="font-weight:600; margin-top:6px;">
          ${r.name}
        </div>

        <div style="font-size:12px; color:${r.is_active ? 'green' : 'red'};">
          ${r.is_active ? 'Open' : 'Closed'}
        </div>

      </div>
    `).join("");
}

// NAVIGATION
function openMenu(id){
  localStorage.setItem("restaurant", id);
  window.location.href = "menu.html";
}

function goBack(){
  window.location.href = "index.html";
}

// START
loadRestaurants();

</script>

</body>
</html>
