<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>All Restaurants</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin:0;
  overflow-x:hidden;
  font-family:sans-serif;
  background:#f5f5f5;
  -webkit-overflow-scrolling:touch;
}
  
.header {
  background:#000;
  color:#fff;
  padding:12px;
  display:flex;
  align-items:center;
  position:sticky;
  top:0;
  z-index:20;
}
  .back { margin-right:10px; cursor:pointer; }
.title { color:#ff9800; font-weight:bold; }

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
  box-sizing:border-box;
}
  
.card {
  background:#fff;
  border-radius:14px;
  padding:10px;
  box-sizing:border-box;
  width:100%;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
  
.card img {
  width:100%;
  height:110px;
  object-fit:cover;
  border-radius:12px;
}
  
  .fbtn {
  padding:6px 12px;
  border-radius:20px;
  border:1px solid #ddd;
  background:#fff;
  cursor:pointer;
}

.fbtn.active {
  background:#ff5722;
  color:#fff;
  border:none;
}
  
</style>

</head>

<body>

<div class="header">
  <div class="back" onclick="goBack()">⬅</div>
  <div class="title" id="title">Restaurants</div>
</div>

<div style="display:flex; gap:10px; padding:10px; position:sticky; top:56px; background:#f5f5f5; z-index:15;">
  <button id="f_all" onclick="setFilter('all')" class="fbtn">All</button>
  <button id="f_veg" onclick="setFilter('veg')" class="fbtn">🟢 Veg</button>
  <button id="f_nonveg" onclick="setFilter('nonveg')" class="fbtn">🔴 Non-Veg</button>
</div>
  
<div class="grid" id="list" style="padding-bottom:80px; margin-top:5px;"></div>
  
<script>

// 🔥 SUPABASE CONFIG
const SUPABASE_URL = "https://zozzoqzryejpkbddzoyi.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpvenpvcXpyeWVqcGtiZGR6b3lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NDMwNzIsImV4cCI6MjA5MTUxOTA3Mn0.RYQqP5mVTtga4Y1XsBTRs_o58Bj2gSLZ5Se6YMak-UE";

const headers = {
  apikey: SUPABASE_KEY,
  Authorization: `Bearer ${SUPABASE_KEY}`
};

  let type = localStorage.getItem("listType");

  let restaurants = [];
  let currentFilter = "all";

// LOAD DATA
async function loadRestaurants(){

  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/restaurants`,
    { headers }
  );

  restaurants = await res.json();

  renderList();
}

// RENDER
function renderList(){

function applyFilter(list){
  if(currentFilter === "veg"){
    return list.filter(r => r.food_type === "veg");
  }
  if(currentFilter === "nonveg"){
    return list.filter(r => r.food_type === "nonveg");
  }
  return list;
}

let filtered = [];

if(type === "price"){
  filtered = applyFilter(restaurants.filter(r => Number(r.commission) === 10 && r.is_active));
  document.getElementById("title").innerText = "Best Price Guaranteed";
}

else if(type === "normal"){
  filtered = applyFilter(restaurants.filter(r => Number(r.commission) !== 10 && r.is_active));
  document.getElementById("title").innerText = "Popular Restaurants";
}

else if(type === "closed"){
  filtered = restaurants.filter(r => !r.is_active);
  document.getElementById("title").innerText = "Currently Closed";
}
  
else {
  filtered = applyFilter(restaurants.filter(r => r.is_active));
}
  
  document.getElementById("list").innerHTML =
    filtered.map(r => `
      <div class="card" onclick="openMenu('${r.id}')">

        <img src="${r.image || 'company-logo.png'}">

<div style="font-weight:600; margin-top:6px; display:flex; align-items:center; gap:6px; overflow:hidden;">
  
  ${r.food_type === "veg"
    ? `<span style="color:green;">●</span>`
    : r.food_type === "nonveg"
    ? `<span style="color:red;">●</span>`
    : `<span style="color:green;">●</span><span style="color:red;">●</span>`
  }

  <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
    ${r.name}
  </span>

</div>
        <div style="font-size:12px; color:${r.is_active ? 'green' : 'red'};">
          ${r.is_active ? 'Open' : 'Closed'}
        </div>

      </div>
    `).join("");
}

  function setFilter(type){
  currentFilter = type;

  document.querySelectorAll(".fbtn").forEach(b => b.classList.remove("active"));
  document.getElementById("f_" + type).classList.add("active");

  renderList();
}
  
// NAVIGATION
function openMenu(id){
  localStorage.setItem("restaurant", id);
  window.location.href = "menu.html";
}

function goBack(){
  window.location.href = "index.html";
}

// START
  loadRestaurants();
document.getElementById("f_all").classList.add("active");

</script>

</body>
</html>
