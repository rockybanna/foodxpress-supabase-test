<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family:sans-serif; margin:0; background:#f5f5f5; }

.header {
  background:#000;
  color:#fff;
  padding:12px;
  display:flex;
  align-items:center;
}

.back { margin-right:10px; cursor:pointer; }
.title { color:#ff9800; font-weight:bold; }

.cart {
  padding:10px;
  padding-bottom:80px;
}
  
.item {
  background:#fff;
  margin:10px;
  padding:12px;
  border-radius:12px;
}

/* ✅ BUTTON UI FIX */
.qty-box {
  display:flex;
  align-items:center;
  gap:8px;
}

.qty-btn {
  width:28px;
  height:28px;
  border:none;
  border-radius:6px;
  background:#eee;
  font-weight:bold;
  cursor:pointer;
}

.qty-btn:hover {
  background:#ddd;
}

.qty-num {
  min-width:20px;
  text-align:center;
  font-weight:bold;
}

.delete-btn {
  background:#ff5252;
  color:#fff;
  border:none;
  border-radius:6px;
  width:28px;
  height:28px;
  cursor:pointer;
}

.delete-btn:hover {
  background:#e53935;
}
</style>
</head>

<body>

<div class="header">
  <div class="back" onclick="goBack()">⬅</div>
  <div class="title">CART</div>
</div>

<div id="resName" style="padding:10px;font-weight:bold;"></div>

<div id="cartItems" class="cart"></div>

<div id="checkoutBar" style="
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  padding:12px;
  border-top:1px solid #ddd;
  display:flex;
  justify-content:space-between;
  align-items:center;
">

  <div id="cartTotal" style="font-weight:bold;"></div>

  <button onclick="checkout()" style="
    background:#ff5722;
    color:#fff;
    border:none;
    padding:10px 16px;
    border-radius:8px;
    font-weight:bold;
  ">
    Proceed →
  </button>

</div>
  
<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

// RENDER
document.getElementById("cartItems").innerHTML =
  cart.length === 0
    ? "Cart is empty"
    : cart.map((c, i) => {

        total += (c.total || 0) * (c.qty || 1);

        return `
<div class="item">

  <div style="font-weight:600;font-size:16px;">
    ${c.name}
  </div>

  <div style="font-size:13px;color:#666;margin-top:4px;line-height:18px;">
    ${c.variant && c.variant > 0 ? `• Variant ₹${c.variant}<br>` : ""}
    
    ${c.addons && c.addons.length > 0 
      ? c.addons.map(a => `• ${a.name} ₹${a.price}`).join("<br>") 
      : ""}
  </div>

  <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;">

    <div style="font-weight:bold;font-size:15px;">
      ₹${(c.total || 0) * (c.qty || 1)}
    </div>

    <div class="qty-box">
      <button class="qty-btn" onclick="dec(${i})">−</button>
      <div class="qty-num">${c.qty}</div>
      <button class="qty-btn" onclick="inc(${i})">+</button>
      <button class="delete-btn" onclick="removeItem(${i})">✕</button>
    </div>

  </div>

</div>
`;
    }).join("");

// RESTAURANT NAME
if(cart.length > 0){
  document.getElementById("resName").innerText =
    cart[0].resName || "Restaurant";
}

// TOTAL
if(cart.length === 0){
  document.getElementById("checkoutBar").style.display = "none";
} else {
  document.getElementById("cartTotal").innerText = "₹" + total;
}

// FUNCTIONS
function goBack(){
  window.history.back();
}

function inc(i){
  cart[i].qty += 1;
  save();
}

function dec(i){
  if(cart[i].qty > 1){
    cart[i].qty -= 1;
  } else {
    cart.splice(i,1);
  }
  save();
}

function removeItem(i){
  cart.splice(i,1);
  save();
}

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
  location.reload();
}

  function checkout(){
  window.location.href = "checkout.html";
}
  
  // next step: address + payment page
  // window.location.href = "checkout.html";
}
  
</script>

</body>
</html>
