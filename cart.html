<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family:sans-serif; margin:0; background:#f5f5f5; }

.header {
  background:#000;
  color:#fff;
  padding:12px;
  display:flex;
  align-items:center;
}

.back { margin-right:10px; cursor:pointer; }
.title { color:#ff9800; font-weight:bold; }

.cart {
  padding:10px;
}

.item {
  background:#fff;
  margin:10px;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="back" onclick="goBack()">⬅</div>
  <div class="title">CART</div>
</div>

<div id="cartItems" class="cart"></div>
  <div id="cartTotal" style="padding:10px;font-weight:bold;"></div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

document.getElementById("cartItems").innerHTML =
  cart.length === 0
    ? "Cart is empty"
    : cart.map((c, i) => {
        total += c.price * c.qty;
        return `
        <div class="item">
          ${c.name} x${c.qty} • ₹${c.price * c.qty}
        </div>
        `;
      }).join("");

document.getElementById("cartTotal").innerText = "Total: ₹" + total;
  
function goBack(){
  window.history.back();
}

</script>

</body>
</html>
