<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family:sans-serif; margin:0; background:#f5f5f5; }

.header {
  background:#000;
  color:#fff;
  padding:12px;
  display:flex;
  align-items:center;
}

.back { margin-right:10px; cursor:pointer; }
.title { color:#ff9800; font-weight:bold; }

.cart {
  padding:10px;
}

.item {
  background:#fff;
  margin:10px;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="back" onclick="goBack()">⬅</div>
  <div class="title">CART</div>
</div>

  <div id="resName" style="padding:10px;font-weight:bold;"></div>
<div id="cartItems" class="cart"></div>
  <div id="cartTotal" style="padding:10px;font-weight:bold;"></div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0; // keep

// reset safety
total = 0;
  
if(cart.length > 0){
  document.getElementById("resName").innerText =
    cart[0].resName || "Restaurant";
}
  
document.getElementById("cartItems").innerHTML =
  cart.length === 0
    ? "Cart is empty"
    : cart.map((c, i) => {
        total += c.price * c.qty;
        return `
        <div class="item">
          <div style="display:flex;justify-content:space-between;align-items:center;">
  <div>
    ${c.name}<br>

${c.variant > 0 ? `+ Variant ₹${c.variant}<br>` : ""}

${c.addons.length > 0 
  ? c.addons.map(a => `+ Addon ₹${a}`).join("<br>") + "<br>" 
  : ""}

<b>₹${c.total * c.qty}</b>

  </div>

  <div>
    <button onclick="dec(${i})">−</button>
    ${c.qty}
    <button onclick="inc(${i})">+</button>
    <button onclick="removeItem(${i})">❌</button>
  </div>
</div>
        </div>
        `;
      }).join("");

if(cart.length === 0){
  document.getElementById("cartTotal").innerText = "";
  document.getElementById("resName").innerText = "";
} else {
  document.getElementById("cartTotal").innerText = "Total: ₹" + total;
}
  
function goBack(){
  window.history.back();
}

  function inc(i){
  cart[i].qty += 1;
  save();
}

function dec(i){
  if(cart[i].qty > 1){
    cart[i].qty -= 1;
  } else {
    cart.splice(i,1);
  }
  save();
}

function removeItem(i){
  cart.splice(i,1);
  save();
}

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
  location.reload();
}
  
</script>

</body>
</html>
