<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family:sans-serif; margin:0; background:#f5f5f5; }

.header {
  background:#000;
  color:#fff;
  padding:12px;
  display:flex;
  align-items:center;
}

.back { margin-right:10px; cursor:pointer; }
.title { color:#ff9800; font-weight:bold; }

.cart {
  padding:10px;
  padding-bottom:80px;
}
  
.item {
  background:#fff;
  margin:10px;
  padding:12px;
  border-radius:12px;
}

/* ✅ BUTTON UI FIX */
.qty-box {
  display:flex;
  align-items:center;
  gap:8px;
}

.qty-btn {
  width:28px;
  height:28px;
  border:none;
  border-radius:6px;
  background:#eee;
  font-weight:bold;
  cursor:pointer;
}

.qty-btn:hover {
  background:#ddd;
}

.qty-num {
  min-width:20px;
  text-align:center;
  font-weight:bold;
}

.delete-btn {
  background:#ff5252;
  color:#fff;
  border:none;
  border-radius:6px;
  width:28px;
  height:28px;
  cursor:pointer;
}

.delete-btn:hover {
  background:#e53935;
}
</style>
</head>

<body>

<div class="header">
  <div class="back" onclick="goBack()">⬅</div>
  <div class="title">CART</div>
</div>

<div id="resName" style="padding:10px;font-weight:bold;"></div>

<div id="cartItems" class="cart"></div>

<div id="checkoutBar" style="
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  padding:12px;
  border-top:1px solid #ddd;
  display:flex;
  justify-content:space-between;
  align-items:center;
">

  <div id="cartTotal" style="font-weight:bold;"></div>

  <button onclick="checkout()" style="
    background:#ff5722;
    color:#fff;
    border:none;
    padding:10px 16px;
    border-radius:8px;
    font-weight:bold;
  ">
    Proceed →
  </button>

</div>
  
<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;
let grouped = [];

// GROUP
cart.forEach(item => {
  let key = item.name + item.variant + JSON.stringify(item.addons);

  let existing = grouped.find(g => g.key === key);

  if(existing){
    existing.qty += item.qty;
    existing.total += item.total;
  } else {
    grouped.push({
      key,
      name: item.name,
      variant: item.variant,
      addons: item.addons,
      qty: item.qty,
      total: item.total
    });
  }
});

// RENDER
document.getElementById("cartItems").innerHTML =
  cart.length === 0
    ? "<div style='padding:20px;text-align:center;'>Cart is empty</div>"
    : grouped.map((c, i) => {

        total += c.total * c.qty;

        return `
<div class="item">

  <div style="font-weight:600;">${c.name}</div>

  <div style="font-size:13px;color:#666;">
    ${c.variant ? `• Variant ₹${c.variant}<br>` : ""}
    ${c.addons?.map(a => `• ${a.name} ₹${a.price}`).join("<br>") || ""}
  </div>

  <div style="display:flex;justify-content:space-between;margin-top:10px;">
    <div>₹${c.total * c.qty}</div>

    <div>
      <button onclick="inc(${i})">+</button>
      ${c.qty}
      <button onclick="dec(${i})">-</button>
    </div>
  </div>

</div>`;
    }).join("");

document.getElementById("cartTotal").innerText = "₹" + total;

// FUNCTIONS
function inc(i){
  grouped[i].qty++;
  save();
}

function dec(i){
  grouped[i].qty--;
  if(grouped[i].qty <= 0) grouped.splice(i,1);
  save();
}

function save(){
  localStorage.setItem("cart", JSON.stringify(grouped));
  location.reload();
}

function checkout(){
  window.location.href = "checkout.html";
}

function goBack(){
  window.history.back();
}
  
</script>

</body>
</html>
