<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
.header{background:#e53935;color:#fff;padding:14px;text-align:center;font-weight:800}
.container{padding:12px}

.card{
 background:#fff;
 padding:12px;
 margin-bottom:10px;
 border-radius:12px;
 box-shadow:0 2px 6px rgba(0,0,0,0.08)
}

.row{
 display:flex;
 justify-content:space-between;
 align-items:center;
 gap:10px
}

img{
 width:70px;
 height:70px;
 object-fit:cover;
 border-radius:10px
}

/* toggle switch */
.switch{
 position:relative;
 display:inline-block;
 width:40px;
 height:22px;
}
.switch input{display:none;}
.slider{
 position:absolute;
 cursor:pointer;
 top:0;left:0;right:0;bottom:0;
 background:#ccc;
 border-radius:22px;
}
.slider:before{
 position:absolute;
 content:"";
 height:18px;width:18px;
 left:2px;bottom:2px;
 background:white;
 border-radius:50%;
 transition:.2s;
}
input:checked + .slider{
 background:#2e7d32;
}
input:checked + .slider:before{
 transform:translateX(18px);
}

.btn{
 padding:6px 10px;
 border-radius:8px;
 border:none;
 color:#fff;
 font-size:12px;
}
.blue{background:#1976d2}
.red{background:#c62828}
.green{background:#2e7d32}
</style>
</head>

<body>

<div class="header">Admin Panel</div>

<div id="login" class="container">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">
<div class="container" id="screen1"></div>
<div class="container" id="screen2" style="display:none"></div>
<div class="container" id="screen3" style="display:none"></div>
</div>

<script>
const PASS="1234";
const URL="https://nhjglpjekexgldahkpjv.supabase.co";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oamdscGpla2V4Z2xkYWhrcGp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MzYwNDksImV4cCI6MjA5MTMxMjA0OX0.mKvmkiWhxFdgE_u1_rJ2MD06EQ7VnFnZ2_4eU1MCGAU";

let restaurants=[],categories=[],items=[];
let currentRestaurant=null,currentCategory=null,currentView="restaurants";

function h(){
 return {
  apikey:KEY,
  Authorization:`Bearer ${KEY}`,
  "Content-Type":"application/json",
  "Prefer":"return=minimal"
 };
}

function login(){
 if(pass.value===PASS){
  login.style.display="none";
  app.style.display="block";
  loadData();
 } else alert("Wrong password");
}

async function loadData(){
 restaurants=await (await fetch(URL+"/rest/v1/restaurants",{headers:h()})).json();
 categories=await (await fetch(URL+"/rest/v1/categories",{headers:h()})).json();
 items=await (await fetch(URL+"/rest/v1/items",{headers:h()})).json();

 if(currentView==="restaurants") renderRestaurants();
 if(currentView==="categories") renderCategories();
 if(currentView==="items") renderItems();
}

/* RESTAURANTS */

function renderRestaurants(){
 screen1.innerHTML="<h3>Restaurants</h3>";
 restaurants.forEach(r=>{
  screen1.innerHTML+=`
  <div class="card">
    <div class="row">
      <b onclick="openRestaurant(${r.id})">${r.name}</b>

      <label class="switch">
        <input type="checkbox" ${r.is_active?'checked':''}
        onchange="toggleRestaurant(${r.id},${r.is_active})">
        <span class="slider"></span>
      </label>

    </div>
  </div>`;
 });
}

async function toggleRestaurant(id,val){
 await fetch(URL+"/rest/v1/restaurants?id=eq."+id,{
  method:"PATCH",
  headers:h(),
  body:JSON.stringify({is_active:!val})
 });
 await loadData();
}

function openRestaurant(id){
 currentRestaurant=id;
 currentView="categories";
 screen1.style.display="none";
 screen2.style.display="block";
 renderCategories();
}

/* CATEGORIES */

function renderCategories(){
 const list=categories
 .filter(c=>c.restaurant_id==currentRestaurant)
 .sort((a,b)=>a.sort_order-b.sort_order);

 screen2.innerHTML=`
 <button onclick="back1()">⬅ Back</button>
 <h3>Categories</h3>
 <button class="btn green" onclick="addCategory()">+ Add Category</button>
 `;

 list.forEach(c=>{
  screen2.innerHTML+=`
  <div class="card">
    <div class="row">
      <b onclick="openCategory(${c.id})">${c.name}</b>

      <label class="switch">
        <input type="checkbox" ${c.is_active?'checked':''}
        onchange="toggleCategory(${c.id},${c.is_active})">
        <span class="slider"></span>
      </label>

    </div>
  </div>`;
 });
}

async function toggleCategory(id,val){
 await fetch(URL+"/rest/v1/categories?id=eq."+id,{
  method:"PATCH",
  headers:h(),
  body:JSON.stringify({is_active:!val})
 });
 await loadData();
}

async function addCategory(){
 const name=prompt("Category Name");
 if(!name) return;

 await fetch(URL+"/rest/v1/categories",{
  method:"POST",
  headers:h(),
  body:JSON.stringify({
    name,
    restaurant_id:currentRestaurant
  })
 });

 await loadData();
}

function openCategory(id){
 currentCategory=id;
 currentView="items";
 screen2.style.display="none";
 screen3.style.display="block";
 renderItems();
}

function back1(){
 currentView="restaurants";
 screen2.style.display="none";
 screen1.style.display="block";
}

/* ITEMS */

function renderItems(){
 const list=items
 .filter(i=>i.category_id==currentCategory)
 .sort((a,b)=>a.sort_order-b.sort_order);

 screen3.innerHTML=`
 <button onclick="back2()">⬅ Back</button>
 <h3>Items</h3>
 <button class="btn green" onclick="addItem()">+ Add Item</button>
 `;

 list.forEach(i=>{
  screen3.innerHTML+=`
  <div class="card">
    <div class="row">

      <div>
        ${i.image_url?`<img src="${i.image_url}"><br>`:""}
        <b>${i.name}</b><br>
        ₹${i.price}
        <br><br>
        <input type="file" onchange="uploadImage(${i.id},this.files[0])">
      </div>

      <div>
        <label class="switch">
          <input type="checkbox" ${i.is_available?'checked':''}
          onchange="toggleItem(${i.id},${i.is_available})">
          <span class="slider"></span>
        </label>

        <br><br>

        <button class="btn blue" onclick="editItem(${i.id},'${i.name}',${i.price})">Edit</button>
        <button class="btn red" onclick="deleteItem(${i.id})">Delete</button>
      </div>

    </div>
  </div>`;
 });
}

async function toggleItem(id,val){
 await fetch(URL+"/rest/v1/items?id=eq."+id,{
  method:"PATCH",
  headers:h(),
  body:JSON.stringify({is_available:!val})
 });
 await loadData();
}

async function addItem(){
 const name=prompt("Item name");
 const price=prompt("Price");
 if(!name || !price) return;

 await fetch(URL+"/rest/v1/items",{
  method:"POST",
  headers:h(),
  body:JSON.stringify({
    name,
    price:Number(price),
    category_id:currentCategory
  })
 });

 await loadData();
}

async function editItem(id,n,p){
 const name=prompt("Name",n);
 const price=prompt("Price",p);
 if(!name || !price) return;

 await fetch(URL+"/rest/v1/items?id=eq."+id,{
  method:"PATCH",
  headers:h(),
  body:JSON.stringify({name,price:Number(price)})
 });

 await loadData();
}

async function deleteItem(id){
 if(!confirm("Delete item?")) return;

 await fetch(URL+"/rest/v1/items?id=eq."+id,{
  method:"DELETE",
  headers:h()
 });

 await loadData();
}

function back2(){
 currentView="categories";
 screen3.style.display="none";
 screen2.style.display="block";
}

/* IMAGE */

async function uploadImage(id,file){
 const fileName=Date.now()+"_"+file.name.replace(/\s/g,"_");

 await fetch(URL+"/storage/v1/object/item-images/"+fileName,{
  method:"POST",
  headers:{
    apikey:KEY,
    Authorization:`Bearer ${KEY}`,
    "Content-Type":file.type
  },
  body:file
 });

 const url=URL+"/storage/v1/object/public/item-images/"+encodeURIComponent(fileName);

 await fetch(URL+"/rest/v1/items?id=eq."+id,{
  method:"PATCH",
  headers:h(),
  body:JSON.stringify({image_url:url})
 });

 await loadData();
}
</script>

</body>
</html>
