<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
.header{background:#e53935;color:#fff;padding:14px;text-align:center;font-weight:800}
.container{padding:12px}
.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,0.08)}

.row{display:flex;justify-content:space-between;align-items:center}
.btn{padding:6px 10px;border-radius:8px;border:none;color:#fff;font-size:12px}
.green{background:#2e7d32}
.red{background:#c62828}
.blue{background:#1976d2}
.orange{background:#f57c00}
</style>
</head>

<body>

<div class="header">Admin Panel</div>

<div id="login" class="container">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<div class="container" id="screen1"></div>
<div class="container" id="screen2" style="display:none"></div>
<div class="container" id="screen3" style="display:none"></div>

</div>

<script>
const PASS="1234";
const URL="https://nhjglpjekexgldahkpjv.supabase.co";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oamdscGpla2V4Z2xkYWhrcGp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MzYwNDksImV4cCI6MjA5MTMxMjA0OX0.mKvmkiWhxFdgE_u1_rJ2MD06EQ7VnFnZ2_4eU1MCGAU";

let restaurants=[],categories=[],items=[];
let currentRestaurant=null;
let currentCategory=null;
let currentView = "restaurants";
 
function login(){
 if(document.getElementById("pass").value===PASS){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  loadData();
 } else alert("Wrong password");
}
 
async function loadData(){
 const h={apikey:KEY,Authorization:`Bearer ${KEY}`};

 restaurants=await (await fetch(URL+"/rest/v1/restaurants",{headers:h})).json();
 categories=await (await fetch(URL+"/rest/v1/categories",{headers:h})).json();
items = await (await fetch(
  URL + "/rest/v1/items?order=id.asc",
  {headers:h}
)).json();
if(currentView==="restaurants"){
  renderRestaurants();
}
else if(currentView==="categories"){
  renderCategories();
}
else if(currentView==="items"){
  renderItems();
}
}

/* ================= RESTAURANTS ================= */

function renderRestaurants(){
 screen1.innerHTML="<h3>Restaurants</h3>";

 restaurants.forEach(r=>{
  screen1.innerHTML+=`
  <div class="card">
    <div class="row">
      <b onclick="openRestaurant(${r.id})">${r.name}</b>
      <button class="btn ${r.is_active?'green':'red'}"
        onclick="toggleRestaurant(${r.id},${r.is_active})">
        ${r.is_active?'ON':'OFF'}
      </button>
    </div>
  </div>`;
 });
}

async function toggleRestaurant(id,val){
 await fetch(URL+"/rest/v1/restaurants?id=eq."+id,{
  method:"PATCH",
  
headers:{
 apikey:KEY,
 Authorization:`Bearer ${KEY}`,
 "Content-Type":"application/json",
 "Prefer":"return=minimal"
},
  body:JSON.stringify({is_active:!val})
 });
await loadData();
if(currentView==="restaurants") renderRestaurants();
if(currentView==="categories") renderCategories();
if(currentView==="items") renderItems();
}

function openRestaurant(id){
 currentRestaurant=id;
 screen1.style.display="none";
 screen2.style.display="block";
 currentView = "categories";
 renderCategories();
}

/* ================= CATEGORIES ================= */

function renderCategories(){
 const list=categories.filter(c=>c.restaurant_id==currentRestaurant);

 screen2.innerHTML=`<button onclick="back1()">⬅ Back</button><h3>Categories</h3>`;

 list.forEach(c=>{
  screen2.innerHTML+=`
  <div class="card">
    <div class="row">
      <b onclick="openCategory(${c.id})">${c.name}</b>
      <button class="btn ${c.is_active?'green':'red'}"
        onclick="toggleCategory(${c.id},${c.is_active})">
        ${c.is_active?'ON':'OFF'}
      </button>
    </div>
  </div>`;
 });
}

async function toggleCategory(id,val){
 await fetch(URL+"/rest/v1/categories?id=eq."+id,{
  method:"PATCH",
headers:{
 apikey:KEY,
 Authorization:`Bearer ${KEY}`,
 "Content-Type":"application/json",
 "Prefer":"return=minimal"
},
  body:JSON.stringify({is_active:!val})
 });
await loadData();
if(currentView==="restaurants") renderRestaurants();
if(currentView==="categories") renderCategories();
if(currentView==="items") renderItems();
}

function openCategory(id){
 currentCategory=id;
 screen2.style.display="none";
 screen3.style.display="block";
 currentView = "items";
 renderItems();
}

function back1(){
 screen2.style.display="none";
 screen1.style.display="block";
 currentView = "restaurants";
}
 
/* ================= ITEMS ================= */

function renderItems(){
 const list = items.filter(i => i.category_id == currentCategory);

 screen3.innerHTML = `<button onclick="back2()">⬅ Back</button><h3>Items</h3>`;

 list.forEach(i=>{
  screen3.innerHTML += `
  <div class="card">
    <div class="row">

      <div>

        ${i.image_url ? `
          <img src="${i.image_url}" 
          style="
            width:60px;
            height:60px;
            object-fit:cover;
            border-radius:8px;
            border:1px solid #ddd;
            margin-bottom:6px;
          "
          onerror="this.style.display='none'">
        ` : ""}

        <b>${i.name}</b><br>
        ₹${i.price}

        <br><br>

        <input type="file" accept="image/*" 
          onchange="uploadImage(${i.id}, this.files[0])">

      </div>

      <div>
        <button class="btn ${i.is_available?'green':'red'}"
          onclick="toggleItem(${i.id},${i.is_available})">
          ${i.is_available?'ON':'OFF'}
        </button>

        <button class="btn blue"
          onclick="editItem(${i.id},'${i.name}',${i.price},'${i.image_url||''}')">
          Edit
        </button>
      </div>

    </div>
  </div>`;
 });
}
 
 async function toggleItem(id,val){
 await fetch(URL+"/rest/v1/items?id=eq."+id,{
  method:"PATCH",
headers:{
 apikey:KEY,
 Authorization:`Bearer ${KEY}`,
 "Content-Type":"application/json",
 "Prefer":"return=minimal"
},
  body:JSON.stringify({is_available:!val})
 });
await loadData();
if(currentView==="restaurants") renderRestaurants();
if(currentView==="categories") renderCategories();
if(currentView==="items") renderItems();
}

async function editItem(id,n,p,img){

 const name=prompt("Name",n);
 if(!name) return;

 const price=prompt("Price",p);
 if(!price || isNaN(price) || Number(price)<=0){
  alert("Invalid price");
  return;
 }

 const image=prompt("Image URL",img||"");

 await fetch(URL+"/rest/v1/items?id=eq."+id,{
  method:"PATCH",
  headers:{
   apikey:KEY,
   Authorization:`Bearer ${KEY}`,
   "Content-Type":"application/json",
   "Prefer":"return=minimal"
  },
  body:JSON.stringify({
   name:name,
   price:Number(price),
   image_url:image
  })
 });

 await loadData();
}
 
function back2(){
 screen3.style.display="none";
 screen2.style.display="block";
 currentView = "categories";
}

 async function uploadImage(itemId, file){

 if(!file){
  alert("No file selected");
  return;
 }

const fileName = Date.now() + "_" + file.name.replace(/\s+/g, "_");
 const res = await fetch(
  URL + "/storage/v1/object/item-images/" + fileName,
  {
    method: "POST",
    headers: {
      apikey: KEY,
      Authorization: `Bearer ${KEY}`,
      "Content-Type": file.type
    },
    body: file
  }
 );

 if(!res.ok){
  alert("Upload failed");
  return;
 }

const publicUrl = URL + "/storage/v1/object/public/item-images/" + encodeURIComponent(fileName);
 await fetch(URL+"/rest/v1/items?id=eq."+itemId,{
  method:"PATCH",
  headers:{
    apikey:KEY,
    Authorization:`Bearer ${KEY}`,
    "Content-Type":"application/json",
    "Prefer":"return=minimal"
  },
  body:JSON.stringify({
    image_url: publicUrl
  })
 });

 alert("Image uploaded");
 await loadData();
}
 
</script>

</body>
</html>
