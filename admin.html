<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel - FoodXpress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
.header{background:#e53935;color:#fff;padding:14px;text-align:center;font-weight:800}
.container{padding:14px}
.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px}

input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#e53935;
  color:#fff;
  font-weight:700;
  margin-top:6px;
  width:100%
}

.small-btn{
  width:auto;
  padding:6px 10px;
  font-size:12px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">Admin Panel</div>

<div id="loginPage" class="container">
  <input id="pass" type="password" placeholder="Enter Password">
  <button onclick="login()">Login</button>
</div>

<div id="app" class="container" style="display:none">

<h3>Add Restaurant</h3>
<div class="card">
  <input id="newRest" placeholder="Restaurant Name">
  <button onclick="addRestaurant()">Add Restaurant</button>
</div>

<h3>Add Category</h3>
<div class="card">
  <select id="catRest"></select>
  <input id="newCat" placeholder="Category Name">
  <button onclick="addCategory()">Add Category</button>
</div>

<h3>Add Item</h3>
<div class="card">
  <select id="rest"></select>
  <select id="cat"></select>
  <input id="name" placeholder="Item Name">
  <input id="price" placeholder="Price">
  <button onclick="addItem()">Add Item</button>
</div>

<h3>Items</h3>

<input id="search" placeholder="🔍 Search..." oninput="renderItems()">

<select id="filterCat" onchange="renderItems()"></select>

<div id="list"></div>

</div>

<script>
const PASS = "1234";

const URL = "https://nhjglpjekexgldahkpjv.supabase.co";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oamdscGpla2V4Z2xkYWhrcGp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MzYwNDksImV4cCI6MjA5MTMxMjA0OX0.mKvmkiWhxFdgE_u1_rJ2MD06EQ7VnFnZ2_4eU1MCGAU";

let restaurants=[],categories=[],items=[];

function login(){
  if(document.getElementById("pass").value === PASS){
    loginPage.style.display="none";
    app.style.display="block";
    loadData();
  } else alert("Wrong password");
}

async function loadData(){
  const headers = {apikey:KEY,Authorization:`Bearer ${KEY}`};

  restaurants = await (await fetch(URL+"/rest/v1/restaurants",{headers})).json();
  categories  = await (await fetch(URL+"/rest/v1/categories",{headers})).json();
  items       = await (await fetch(URL+"/rest/v1/items",{headers})).json();

  renderDropdowns();
  renderItems();
}

function renderDropdowns(){
  rest.innerHTML = restaurants.map(x=>`<option value="${x.id}">${x.name}</option>`).join("");
  catRest.innerHTML = rest.innerHTML;

  updateCats();
  loadFilterCategories();
}

function updateCats(){
  const rid = rest.value;
  cat.innerHTML = categories
    .filter(x=>x.restaurant_id==rid)
    .map(x=>`<option value="${x.id}">${x.name}</option>`)
    .join("");
}

function loadFilterCategories(){
  const rid = rest.value;
  filterCat.innerHTML = `<option value="">All Categories</option>` +
    categories
    .filter(x=>x.restaurant_id==rid)
    .map(x=>`<option value="${x.id}">${x.name}</option>`)
    .join("");
}

async function addRestaurant(){
  const name = newRest.value.trim();
  if(!name) return alert("Enter name");

  await fetch(URL+"/rest/v1/restaurants",{
    method:"POST",
    headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,"Content-Type":"application/json"},
    body:JSON.stringify({name,is_active:true})
  });

  loadData();
}

async function addCategory(){
  const name = newCat.value.trim();
  if(!name) return alert("Enter name");

  await fetch(URL+"/rest/v1/categories",{
    method:"POST",
    headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,"Content-Type":"application/json"},
    body:JSON.stringify({name,restaurant_id:catRest.value,is_active:true})
  });

  loadData();
}

async function addItem(){
  const name = nameInput.value.trim();
  const price = priceInput.value.trim();

  if(!name) return alert("Enter item name");
  if(!price || isNaN(price)) return alert("Enter valid price");

  await fetch(URL+"/rest/v1/items",{
    method:"POST",
    headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,"Content-Type":"application/json"},
    body:JSON.stringify({
      restaurant_id:rest.value,
      category_id:cat.value,
      name,
      price:Number(price),
      is_available:true
    })
  });

  loadData();
}

function renderItems(){
  const rid = rest.value;
  const searchVal = search.value.toLowerCase();
  const catVal = filterCat.value;

  list.innerHTML="";

  items
    .filter(i=>i.restaurant_id==rid)
    .filter(i=>!catVal || i.category_id==catVal)
    .filter(i=>i.name.toLowerCase().includes(searchVal))
    .forEach(i=>{
      list.innerHTML += `
      <div style="
        background:#fff;
        border-radius:14px;
        padding:14px;
        margin-bottom:10px;
        box-shadow:0 2px 6px rgba(0,0,0,0.08);
        border-left:5px solid ${i.is_available ? '#4caf50':'#c62828'};
      ">
        <div style="display:flex;justify-content:space-between;">
          <b>${i.name}</b>
          <b style="color:#e53935">₹${i.price}</b>
        </div>

        <div style="margin-top:10px;display:flex;gap:6px;">
          <button class="small-btn" onclick="editItem(${i.id},'${i.name}',${i.price})" style="background:#1976d2">Edit</button>
          <button class="small-btn" onclick="toggleItem(${i.id},${i.is_available})" style="background:#f57c00">
            ${i.is_available?'Disable':'Enable'}
          </button>
          <button class="small-btn" onclick="del(${i.id})" style="background:#c62828">Delete</button>
        </div>
      </div>`;
    });
}

async function editItem(id,n,p){
  const name = prompt("Name",n);
  const price = prompt("Price",p);
  if(!name||!price) return;

  await fetch(URL+"/rest/v1/items?id=eq."+id,{
    method:"PATCH",
    headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,"Content-Type":"application/json"},
    body:JSON.stringify({name,price})
  });

  loadData();
}

async function toggleItem(id,c){
  await fetch(URL+"/rest/v1/items?id=eq."+id,{
    method:"PATCH",
    headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,"Content-Type":"application/json"},
    body:JSON.stringify({is_available:!c})
  });
  loadData();
}

async function del(id){
  await fetch(URL+"/rest/v1/items?id=eq."+id,{
    method:"DELETE",
    headers:{apikey:KEY,Authorization:`Bearer ${KEY}`}
  });
  loadData();
}

rest.onchange=()=>{
  updateCats();
  loadFilterCategories();
  renderItems();
};
</script>

</body>
</html>
