<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel - FoodXpress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
.header{background:#e53935;color:#fff;padding:14px;text-align:center;font-weight:800}
.container{padding:14px}
.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px}
input,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc}
button{padding:10px;border:none;border-radius:8px;background:#e53935;color:#fff;font-weight:700;margin-top:6px;width:100%}
.small-btn{width:auto;padding:6px 10px;margin:4px;font-size:12px}
</style>
</head>

<body>

<div class="header">Admin Panel</div>

<div id="loginPage" class="container">
  <input id="pass" type="password" placeholder="Enter Password">
  <button onclick="login()">Login</button>
</div>

<div id="app" class="container" style="display:none">

  <h3>Add Restaurant</h3>
<div class="card">
  <input id="newRest" placeholder="Restaurant Name">
  <button onclick="addRestaurant()">Add Restaurant</button>
</div>

<h3>Add Category</h3>
<div class="card">
  <select id="catRest"></select>
  <input id="newCat" placeholder="Category Name">
  <button onclick="addCategory()">Add Category</button>
</div>
  
  <h3>Add Item</h3>
  <div class="card">
    <select id="rest"></select>
    <select id="cat"></select>
    <input id="name" placeholder="Item Name">
    <input id="price" placeholder="Price">
    <button onclick="addItem()">Add Item</button>
  </div>

<h3>Items</h3>

<input id="search" placeholder="Search item..." oninput="renderItems()">

<select id="filterCat" onchange="renderItems()"></select>

<div id="list"></div>
  </div>

<script>
const PASS = "1234";

const URL = "https://nhjglpjekexgldahkpjv.supabase.co";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oamdscGpla2V4Z2xkYWhrcGp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MzYwNDksImV4cCI6MjA5MTMxMjA0OX0.mKvmkiWhxFdgE_u1_rJ2MD06EQ7VnFnZ2_4eU1MCGAU";

let restaurants=[],categories=[],items=[];

function login(){
  if(document.getElementById("pass").value === PASS){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("app").style.display="block";
    loadData();
  } else {
    alert("Wrong password");
  }
}

async function loadData(){
  const headers = {apikey:KEY,Authorization:`Bearer ${KEY}`};

  const r = await fetch(URL+"/rest/v1/restaurants", {headers});
  restaurants = await r.json();

  const c = await fetch(URL+"/rest/v1/categories", {headers});
  categories = await c.json();

  const i = await fetch(URL+"/rest/v1/items", {headers});
  items = await i.json();

  renderDropdowns();
  renderItems();
}

function renderDropdowns(){
  const r = document.getElementById("rest");
  const catRest = document.getElementById("catRest");
catRest.innerHTML = restaurants.map(x=>`<option value="${x.id}">${x.name}</option>`).join("");
  r.innerHTML = restaurants.map(x=>`<option value="${x.id}">${x.name}</option>`).join("");

  updateCats();
  loadFilterCategories();
}
  
function updateCats(){
  const rid = document.getElementById("rest").value;
  const c = document.getElementById("cat");

  c.innerHTML = categories
    .filter(x=>x.restaurant_id==rid)
    .map(x=>`<option value="${x.id}">${x.name}</option>`)
    .join("");
}
  
  function loadFilterCategories(){
  const rid = document.getElementById("rest").value;
  const fc = document.getElementById("filterCat");

  fc.innerHTML = `
    <option value="">All Categories</option>
  ` + categories
    .filter(x=>x.restaurant_id == rid)
    .map(x=>`<option value="${x.id}">${x.name}</option>`)
    .join("");
}
  
async function addItem(){

  const name = document.getElementById("name").value.trim();
  const price = document.getElementById("price").value.trim();
  const rid = document.getElementById("rest").value;
  const cid = document.getElementById("cat").value;

  if(!name) return alert("Enter item name");
  if(!price || isNaN(price)) return alert("Enter valid price");

  await fetch(URL+"/rest/v1/items",{
    method:"POST",
    headers:{
      apikey:KEY,
      Authorization:`Bearer ${KEY}`,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      restaurant_id:rid,
      category_id:cid,
      name:name,
      price:Number(price),
      is_available:true
    })
  });

  alert("Added");
  loadData();
}

  
function renderItems(){

  const box = document.getElementById("list");
  const rid = document.getElementById("rest").value;
  const search = document.getElementById("search").value.toLowerCase();
  const cat = document.getElementById("filterCat").value;

  box.innerHTML = "";

  items
    .filter(i => i.restaurant_id == rid)
    .filter(i => !cat || i.category_id == cat)
    .filter(i => i.name.toLowerCase().includes(search))
    .forEach(i => {

      box.innerHTML += `
        <div class="card">
          <b>${i.name}</b><br>
          ₹${i.price}

          <div style="margin-top:6px;">
            <button class="small-btn" onclick="editItem(${i.id}, '${i.name}', ${i.price})">Edit</button>
            <button class="small-btn" onclick="toggleItem(${i.id}, ${i.is_available})">
              ${i.is_available ? 'Disable' : 'Enable'}
            </button>
            <button class="small-btn" onclick="del(${i.id})">Delete</button>
          </div>
        </div>
      `;
    });
}

  async function addRestaurant(){

  const name = document.getElementById("newRest").value;
  if(!name) return alert("Enter name");

  await fetch(URL+"/rest/v1/restaurants",{
    method:"POST",
    headers:{
      apikey:KEY,
      Authorization:`Bearer ${KEY}`,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      name:name,
      is_active:true
    })
  });

  alert("Restaurant added");
  loadData();
}

async function addCategory(){

  const name = document.getElementById("newCat").value;
  const rid = document.getElementById("catRest").value;

  if(!name) return alert("Enter name");

  await fetch(URL+"/rest/v1/categories",{
    method:"POST",
    headers:{
      apikey:KEY,
      Authorization:`Bearer ${KEY}`,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      name:name,
      restaurant_id:rid,
      is_active:true
    })
  });

  alert("Category added");
  loadData();
}

  
  async function editItem(id, oldName, oldPrice){

  const name = prompt("Edit name", oldName);
  if(!name) return;

  const price = prompt("Edit price", oldPrice);
  if(!price) return;

  await fetch(URL+"/rest/v1/items?id=eq."+id,{
    method:"PATCH",
    headers:{
      apikey:KEY,
      Authorization:`Bearer ${KEY}`,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      name:name,
      price:price
    })
  });

  loadData();
}

  async function toggleItem(id, current){

  await fetch(URL+"/rest/v1/items?id=eq."+id,{
    method:"PATCH",
    headers:{
      apikey:KEY,
      Authorization:`Bearer ${KEY}`,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      is_available: !current
    })
  });

  loadData();
}

document.getElementById("rest").onchange = () => {
  updateCats();
  loadFilterCategories();
  renderItems();
};
  
async function del(id){
  await fetch(URL+"/rest/v1/items?id=eq."+id,{
    method:"DELETE",
    headers:{apikey:KEY,Authorization:`Bearer ${KEY}`}
  });

  loadData();
}
</script>

</body>
</html>
