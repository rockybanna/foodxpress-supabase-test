<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food Xpress Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
.header{background:#e53935;color:#fff;padding:12px;text-align:center;font-weight:800}
.container{padding:10px}
.card{
 display:flex;
 justify-content:space-between;
 align-items:center;
 background:#fff;
 padding:10px;
 margin-bottom:8px;
 border-radius:10px;
}
.btn{padding:6px 8px;border:none;border-radius:6px;color:#fff;font-size:12px}
.blue{background:#1976d2}
.red{background:#c62828}
.green{background:#2e7d32}
input,textarea{width:100%;padding:8px;margin:5px 0}
</style>
</head>

<body>

<div class="header">Admin Panel</div>

<div id="login">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">
<div class="container" id="screen"></div>
</div>

<script>

/* 🔥 CONFIG (your new project) */
const URL = "https://zozzoqzryejpkbddzoyi.supabase.co";
const KEY = "YOUR-ANON-KEY"; // keep same for now

const PASS = "admin123"; // change later

function h(){
 return {
  apikey:KEY,
  Authorization:`Bearer ${KEY}`,
  "Content-Type":"application/json"
 };
}

let restaurants=[],categories=[],items=[],variants=[],addons=[];
let currentRestaurant=null,currentCategory=null,currentItem=null;
let view="restaurants";

/* LOGIN */
function login(){
 if(pass.value!==PASS) return alert("Wrong password");
 login.style.display="none";
 app.style.display="block";
 loadData();
}

/* LOAD DATA */
async function loadData(){

 restaurants = await fetch(URL+"/rest/v1/restaurants",{headers:h()}).then(r=>r.json());
 categories  = await fetch(URL+"/rest/v1/categories",{headers:h()}).then(r=>r.json());
 items       = await fetch(URL+"/rest/v1/items",{headers:h()}).then(r=>r.json());
 variants    = await fetch(URL+"/rest/v1/variants",{headers:h()}).then(r=>r.json());
 addons      = await fetch(URL+"/rest/v1/addons",{headers:h()}).then(r=>r.json());

 render();
}

/* ROUTER */
function render(){
 if(view==="restaurants") renderRestaurants();
 if(view==="categories") renderCategories();
 if(view==="items") renderItems();
 if(view==="variants") renderVariants();
 if(view==="addons") renderAddons();
}

/* RESTAURANTS */
function renderRestaurants(){

 screen.innerHTML = `
 <h3>Restaurants</h3>
 <button class="btn green" onclick="addRestaurant()">+ Add</button>

 ${restaurants.map(r=>`
  <div class="card">
    <b onclick="openRestaurant('${r.id}')">${r.name}</b>
  </div>
 `).join("")}
 `;
}

function openRestaurant(id){
 currentRestaurant=id;
 view="categories";
 render();
}

async function addRestaurant(){
 const name = prompt("Restaurant name");
 if(!name) return;

 await fetch(URL+"/rest/v1/restaurants",{
  method:"POST",
  headers:h(),
  body:JSON.stringify({name})
 });

 loadData();
}

/* CATEGORIES */
function renderCategories(){

 const list = categories.filter(c=>c.restaurant_id==currentRestaurant);

 screen.innerHTML = `
 <button onclick="view='restaurants';render()">⬅ Back</button>
 <h3>Categories</h3>
 <button class="btn green" onclick="addCategory()">+ Add</button>

 ${list.map(c=>`
  <div class="card">
    <b onclick="openCategory('${c.id}')">${c.name}</b>
  </div>
 `).join("")}
 `;
}

function openCategory(id){
 currentCategory=id;
 view="items";
 render();
}

async function addCategory(){
 const name = prompt("Category name");
 if(!name) return;

 await fetch(URL+"/rest/v1/categories",{
  method:"POST",
  headers:h(),
  body:JSON.stringify({
   name,
   restaurant_id:currentRestaurant
  })
 });

 loadData();
}

/* ITEMS */
function renderItems(){

 const list = items.filter(i=>i.category_id==currentCategory);

 screen.innerHTML = `
 <button onclick="view='categories';render()">⬅ Back</button>
 <h3>Items</h3>
 <button class="btn green" onclick="addItem()">+ Add</button>

 ${list.map(i=>`
  <div class="card">
    <div>
      <b onclick="openItem('${i.id}')">${i.name}</b><br>
      ₹${i.price}
    </div>
    <button class="btn red" onclick="deleteItem('${i.id}')">Del</button>
  </div>
 `).join("")}
 `;
}

function openItem(id){
 currentItem=id;
 view="variants";
 render();
}

async function addItem(){
 const name = prompt("Item name");
 const price = prompt("Price");

 if(!name || !price) return;

 await fetch(URL+"/rest/v1/items",{
  method:"POST",
  headers:h(),
  body:JSON.stringify({
   name,
   price:Number(price),
   category_id:currentCategory,
   restaurant_id:currentRestaurant
  })
 });

 loadData();
}

async function deleteItem(id){
 await fetch(URL+"/rest/v1/items?id=eq."+id,{
  method:"DELETE",
  headers:h()
 });
 loadData();
}

/* VARIANTS */
function renderVariants(){

 const list = variants.filter(v=>v.item_id==currentItem);

 screen.innerHTML = `
 <button onclick="view='items';render()">⬅ Back</button>
 <h3>Variants</h3>
 <button class="btn green" onclick="addVariant()">+ Add</button>

 ${list.map(v=>`
  <div class="card">
    ${v.name} - ₹${v.price}
  </div>
 `).join("")}

 <hr>
 <button class="btn blue" onclick="view='addons';render()">Manage Addons →</button>
 `;
}

async function addVariant(){
 const name = prompt("Variant name (Half / Full)");
 const price = prompt("Price");

 await fetch(URL+"/rest/v1/variants",{
  method:"POST",
  headers:h(),
  body:JSON.stringify({
   name,
   price:Number(price),
   item_id:currentItem
  })
 });

 loadData();
}

/* ADDONS */
function renderAddons(){

 const list = addons.filter(a=>a.item_id==currentItem);

 screen.innerHTML = `
 <button onclick="view='variants';render()">⬅ Back</button>
 <h3>Addons</h3>
 <button class="btn green" onclick="addAddon()">+ Add</button>

 ${list.map(a=>`
  <div class="card">
    ${a.name} - ₹${a.price}
  </div>
 `).join("")}
 `;
}

async function addAddon(){
 const name = prompt("Addon name");
 const price = prompt("Price");

 await fetch(URL+"/rest/v1/addons",{
  method:"POST",
  headers:h(),
  body:JSON.stringify({
   name,
   price:Number(price),
   item_id:currentItem
  })
 });

 loadData();
}

</script>

</body>
</html>
