<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel Lite</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
.header{background:#e53935;color:#fff;padding:12px;text-align:center;font-weight:800}
.container{padding:10px}

.card{
 display:flex;
 justify-content:space-between;
 align-items:center;
 background:#fff;
 padding:8px;
 margin-bottom:6px;
 border-radius:10px;
}

.left{display:flex;gap:10px;align-items:center}

img{width:50px;height:50px;border-radius:6px;object-fit:cover}

.switch{position:relative;width:40px;height:20px}
.switch input{display:none}
.slider{position:absolute;inset:0;background:#ccc;border-radius:20px}
.slider:before{content:"";position:absolute;width:16px;height:16px;left:2px;bottom:2px;background:#fff;border-radius:50%}
input:checked + .slider{background:#2e7d32}
input:checked + .slider:before{transform:translateX(18px)}

.btn{padding:4px 6px;border:none;border-radius:6px;color:#fff;font-size:11px}
.blue{background:#1976d2}
.red{background:#c62828}
.green{background:#2e7d32}
</style>
</head>

<body>

<div class="header">Admin Panel</div>

<div id="loginScreen" class="container">
<input id="pass" type="password" placeholder="Password">
<button onclick="doLogin()">Login</button>
</div>

<div id="app" style="display:none">
<div class="container" id="screen1"></div>
<div class="container" id="screen2" style="display:none"></div>
<div class="container" id="screen3" style="display:none"></div>
</div>

<script>

/* ===== CONFIG ===== */

const PASS="1234";
const URL="https://zozzoqzryejpkbddzoyi.supabase.co";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpvenpvcXpyeWVqcGtiZGR6b3lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NDMwNzIsImV4cCI6MjA5MTUxOTA3Mn0.RYQqP5mVTtga4Y1XsBTRs_o58Bj2gSLZ5Se6YMak-UE";

let restaurants=[],categories=[],items=[];
let currentRestaurant=null,currentCategory=null,currentView="restaurants";

/* ===== HEADERS ===== */

function h(){
 return {
  apikey:KEY,
  Authorization:`Bearer ${KEY}`,
  "Content-Type":"application/json",
  "Prefer":"return=minimal"
 };
}

/* ===== LOGIN ===== */

function doLogin(){

 if(pass.value!==PASS) return alert("Wrong password");

 document.getElementById("loginScreen").style.display="none";
 document.getElementById("app").style.display="block";

 loadData();
}

/* ===== LOAD ===== */

async function loadData(){

 restaurants = await fetch(URL+"/rest/v1/restaurants",{headers:h()}).then(r=>r.json());
 categories  = await fetch(URL+"/rest/v1/categories",{headers:h()}).then(r=>r.json());
 items       = await fetch(URL+"/rest/v1/items",{headers:h()}).then(r=>r.json());

 render();
}

/* ===== ROUTER ===== */

function render(){

 if(currentView==="restaurants") renderRestaurants();
 if(currentView==="categories") renderCategories();
 if(currentView==="items") renderItems();
}

/* ===== RESTAURANTS ===== */

function renderRestaurants(){

 screen1.style.display="block";
 screen2.style.display="none";

 screen1.innerHTML = `
 <h3>Restaurants</h3>

 ${restaurants.map(r=>`
  <div class="card">

   <div class="left">
    <b onclick="openRestaurant(${r.id})">${r.name}</b>
   </div>

   <label class="switch">
    <input type="checkbox" ${r.is_active?'checked':''}
    onchange="toggleRestaurant(${r.id},${r.is_active})">
    <span class="slider"></span>
   </label>

  </div>
 `).join("")}
 `;
}

function openRestaurant(id){
 currentRestaurant=id;
 currentView="categories";
 render();
}

async function toggleRestaurant(id,val){

 await fetch(URL+"/rest/v1/restaurants?id=eq."+id,{
  method:"PATCH",
  headers:h(),
  body:JSON.stringify({is_active:!val})
 });

 loadData();
}

/* ===== CATEGORIES ===== */

function renderCategories(){

 screen1.style.display="none";
 screen2.style.display="block";

 const list = categories
  .filter(c=>c.restaurant_id==currentRestaurant)
  .sort((a,b)=>a.sort_order-b.sort_order);

 screen2.innerHTML = `
 <button onclick="back1()">⬅ Back</button>
 <h3>Categories</h3>
 <button class="btn green" onclick="addCategory()">+ Add</button>

 ${list.map(c=>`
  <div class="card">

   <div class="left">
    <b onclick="openCategory(${c.id})">${c.name}</b>
   </div>

   <label class="switch">
    <input type="checkbox" ${c.is_active?'checked':''}
    onchange="toggleCategory(${c.id},${c.is_active})">
    <span class="slider"></span>
   </label>

  </div>
 `).join("")}
 `;
}

function back1(){
 currentView="restaurants";
 render();
}

function openCategory(id){
 currentCategory=id;
 currentView="items";
 render();
}

async function toggleCategory(id,val){

 await fetch(URL+"/rest/v1/categories?id=eq."+id,{
  method:"PATCH",
  headers:h(),
  body:JSON.stringify({is_active:!val})
 });

 loadData();
}

async function addCategory(){

 const name = prompt("Category Name");
 if(!name) return;

 await fetch(URL+"/rest/v1/categories",{
  method:"POST",
  headers:h(),
  body:JSON.stringify({
   name:name,
   restaurant_id:currentRestaurant
  })
 });

 loadData();
}

/* ===== ITEMS ===== */

function renderItems(){

 screen2.style.display="none";
 screen3.style.display="block";

 const list = items
  .filter(i=>i.category_id==currentCategory)
  .sort((a,b)=>a.sort_order-b.sort_order);

 screen3.innerHTML = `
 <button onclick="back2()">⬅ Back</button>
 <h3>Items</h3>
 <button class="btn green" onclick="addItem()">+ Add</button>

 ${list.map(i=>`
  <div class="card">

   <div class="left">
    ${i.image_url?`<img src="${i.image_url}">`:""}
    <div>
     <b>${i.name}</b><br>
     ₹${i.price}<br>
     <input type="file" onchange="uploadImage(${i.id},this.files[0])">
    </div>
   </div>

   <div>
    <label class="switch">
     <input type="checkbox" ${i.is_available?'checked':''}
     onchange="toggleItem(${i.id},${i.is_available})">
     <span class="slider"></span>
    </label>
    <br>
    <button class="btn blue" onclick="editItem(${i.id},'${i.name}',${i.price})">Edit</button>
    <button class="btn red" onclick="deleteItem(${i.id})">Del</button>
   </div>

  </div>
 `).join("")}
 `;
}

function back2(){
 currentView="categories";
 render();
}

/* ===== ITEM ACTIONS ===== */

async function toggleItem(id,val){

 await fetch(URL+"/rest/v1/items?id=eq."+id,{
  method:"PATCH",
  headers:h(),
  body:JSON.stringify({is_available:!val})
 });

 loadData();
}

async function addItem(){

 const name = prompt("Item name");
 const price = prompt("Price");
 if(!name || !price) return;

 await fetch(URL+"/rest/v1/items",{
  method:"POST",
  headers:h(),
  body:JSON.stringify({
   name:name,
   price:Number(price),
   category_id:currentCategory
  })
 });

 loadData();
}

async function editItem(id,n,p){

 const name = prompt("Name",n);
 const price = prompt("Price",p);
 if(!name || !price) return;

 await fetch(URL+"/rest/v1/items?id=eq."+id,{
  method:"PATCH",
  headers:h(),
  body:JSON.stringify({
   name:name,
   price:Number(price)
  })
 });

 loadData();
}

async function deleteItem(id){

 if(!confirm("Delete item?")) return;

 await fetch(URL+"/rest/v1/items?id=eq."+id,{
  method:"DELETE",
  headers:h()
 });

 loadData();
}

/* ===== IMAGE ===== */

async function uploadImage(id,file){

 const fileName = Date.now()+"_"+file.name.replace(/\s/g,"_");

 await fetch(URL+"/storage/v1/object/item-images/"+fileName,{
  method:"POST",
  headers:{
   apikey:KEY,
   Authorization:`Bearer ${KEY}`,
   "Content-Type":file.type
  },
  body:file
 });

 const url = URL+"/storage/v1/object/public/item-images/"+encodeURIComponent(fileName);

 await fetch(URL+"/rest/v1/items?id=eq."+id,{
  method:"PATCH",
  headers:h(),
  body:JSON.stringify({image_url:url})
 });

 loadData();
}

</script>

</body>
</html>
