<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }

/* HEADER */
.header {
  background:#000;
  color:#fff;
  padding:12px;
  display:flex;
  align-items:center;
}
.back { margin-right:10px; cursor:pointer; }
.title { color:#ff9800; font-weight:bold; }

/* ITEM */
.item {
  background:#fff;
  margin:10px;
  padding:14px;
  border-radius:14px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
  
.row {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.btn {
  background:#ff5722;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:8px;
  width:100%;
  font-weight:bold;
  margin-top:15px;
}
  
/* POPUP */
.popup {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-radius:18px 18px 0 0;
  padding:16px;
  display:none;
  box-shadow:0 -4px 20px rgba(0,0,0,0.2);
  max-height:80vh;
  overflow-y:auto;
}

.popup h3 {
  margin:0 0 10px 0;
}

.section {
  margin-top:12px;
}

.option {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 0;
  border-bottom:1px solid #eee;
}

.option:last-child {
  border-bottom:none;
}

</style>
</head>

<body>

<div class="header">
  <div class="back" onclick="goBack()">⬅</div>

<div class="title" id="resTitle"></div>
  
  <div style="margin-left:auto; cursor:pointer;" onclick="openCart()">
    🛒 <span id="cartCount">0</span>
  </div>
</div>
  
<input id="search" placeholder="Search item..." 
  style="width:95%;margin:10px;padding:10px;border-radius:8px;border:1px solid #ddd;"
  oninput="renderItems()">

<div id="categories" style="
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px;
"></div>

<div id="items"></div>
  
<!-- POPUP -->
<div class="overlay" id="overlay" onclick="closePopup()"></div>

<div class="popup" id="popup">
  <h3 id="pname"></h3>

<div class="section">
  <b>Choose Size</b>
  <div id="variants"></div>
</div>

<div class="section">
  <b>Add Extras</b>
  <div id="addons"></div>
</div>
  
  <div id="total" style="margin-top:10px;font-weight:bold;"></div>

<button class="btn" onclick="addToCart()">Add to Cart</button>
</div>

<script>

// SELECTED RESTAURANT
let resId = localStorage.getItem("restaurant");
  let selectedCat = "All";
  
  let restaurantNames = {
  1: "Pizza Hub",
  2: "Burger King",
  3: "Cake World",
  4: "Biryani House",
  5: "Thali Center"
};

document.getElementById("resTitle").innerText =
  restaurantNames[resId] || "MENU";

// ITEMS
let items = [
{id:1,res:1,name:"Pizza",price:120,cat:"Pizza"},
{id:2,res:1,name:"Burger",price:80,cat:"Burger"},
{id:3,res:4,name:"Biryani",price:200,cat:"Biryani"},
];

// VARIANTS
let variants = [
  {item:1,name:"Regular",price:0},
  {item:1,name:"Large",price:50},

  {item:3,name:"Half",price:0},
  {item:3,name:"Full",price:100}
];

// ADDONS
let addons = [
  {item:1,name:"Cheese",price:30},
  {item:1,name:"Extra Sauce",price:20}
];

// FILTER ITEMS

function renderItems(){

  let search = document.getElementById("search").value.toLowerCase();

  let filtered = items.filter(i => 
    i.res == resId &&
    (selectedCat === "All" || i.cat === selectedCat) &&
    i.name.toLowerCase().includes(search)
  );

  document.getElementById("items").innerHTML =
    filtered.map(i => `
      <div class="item">
        <div class="row">
          <div>
            <div>${i.name}</div>
            <div>₹${i.price}</div>
          </div>
          <button class="btn" onclick="openPopup(${i.id})">Add</button>
        </div>
      </div>
    `).join("");
}
  
let cats = ["All", ...new Set(items.filter(i => i.res == resId).map(i => i.cat))];
  
function renderCategories(){
  document.getElementById("categories").innerHTML =
    cats.map(c => `
      <div onclick="selectCat('${c}')"
        style="
          padding:6px 12px;
          border-radius:20px;
          background:${selectedCat === c ? '#ff5722' : '#eee'};
          color:${selectedCat === c ? '#fff' : '#000'};
          cursor:pointer;
          white-space:nowrap;
        ">
        ${c}
      </div>
    `).join("");
}
  
  function selectCat(c){
  selectedCat = c;
  renderCategories();
  renderItems();
}

  
// CURRENT ITEM
let currentItem = null;
let selectedVariant = 0;
let selectedAddons = [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];
  
  updateCartCount();
  
// OPEN POPUP
function openPopup(id){

  currentItem = id;
  selectedVariant = 0;
  selectedAddons = [];
  
  let item = items.find(i => i.id == id);

  document.getElementById("pname").innerText = item.name;

  // VARIANTS
  let v = variants.filter(v => v.item == id);
  document.getElementById("variants").innerHTML =
    v.map(x => `
  <div class="option">
    <div>${x.name}</div>
    <div>
      +₹${x.price}
      <input type="radio" name="var"
        onclick="selectedVariant=${x.price}; updateTotal()">
    </div>
  </div>
`).join("");
  
  // ADDONS
  let a = addons.filter(a => a.item == id);
  document.getElementById("addons").innerHTML =
    a.map(x => `
  <div class="option">
    <div>${x.name}</div>
    <div>
      +₹${x.price}
      <input type="checkbox"
        onclick="toggleAddon('${x.name}', ${x.price}, this.checked); updateTotal()">
    </div>
  </div>
`).join("");

  updateTotal();
  
  document.getElementById("popup").style.display = "block";
  document.getElementById("overlay").style.display = "block";
}

// ADDON TOGGLE
function toggleAddon(name, price, checked){
  if(checked){
    selectedAddons.push({name:name, price:price});
  } else {
    selectedAddons = selectedAddons.filter(a => a.name !== name);
  }
}
  
// ADD TO CART
function addToCart(){
  if(cart.length > 0 && cart[0].resId != resId){

  let confirmClear = confirm(
    "Cart has items from another restaurant.\n\nOK = Clear cart & add new\nCancel = Go to cart"
  );

  if(confirmClear){
    cart = [];
    localStorage.setItem("cart", JSON.stringify(cart));
  } else {
    window.location.href = "cart.html";
    return;
  }
}
  let item = items.find(i => i.id == currentItem);
  let addonTotal = selectedAddons.reduce((a,b)=>a + b.price, 0);

  let total = item.price + selectedVariant + addonTotal;

let existing = cart.find(c =>
  c.name === item.name &&
  c.variant === selectedVariant &&
  JSON.stringify(c.addons) === JSON.stringify(selectedAddons) &&
  c.resId === resId
);
  
if(existing){
  existing.qty += 1;
} else {
  
cart.push({
  name: item.name,
  basePrice: item.price,
  variant: selectedVariant,
  addons: selectedAddons,
  total: total,
  qty: 1,
  resId: resId,
  resName: restaurantNames[resId]  // later dynamic
});
}
  
  localStorage.setItem("cart", JSON.stringify(cart));

  updateCartCount();

  alert("Added ₹" + total);

  console.log(cart);

  closePopup();
}
  
// CLOSE
function closePopup(){
  document.getElementById("popup").style.display = "none";
  document.getElementById("overlay").style.display = "none";
}

function goBack(){
  window.location.href = "index.html";
}

  function updateTotal(){
  let base = items.find(i => i.id == currentItem).price;
  let addonTotal = selectedAddons.reduce((a,b)=>a + b.price, 0);

  let total = base + selectedVariant + addonTotal;

  document.getElementById("total").innerText = "Total: ₹" + total;
}
  
  function updateCartCount(){
  document.getElementById("cartCount").innerText = cart.length;
}
  
  
  function openCart(){
  window.location.href = "cart.html";
}
  
renderCategories();
renderItems();

</script>

</body>
</html>
