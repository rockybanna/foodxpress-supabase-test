<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Checkout</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family:sans-serif; margin:0; background:#f5f5f5; }

.header {
  background:#000;
  color:#fff;
  padding:12px;
}

.title { color:#ff9800; font-weight:bold; }

.section {
  background:#fff;
  margin:10px;
  padding:12px;
  border-radius:10px;
}

.input {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ddd;
}

.item {
  padding:6px 0;
  border-bottom:1px solid #eee;
}

.total {
  font-weight:bold;
  margin-top:10px;
}

.btn {
  background:#ff5722;
  color:#fff;
  border:none;
  width:100%;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">Checkout</div>
</div>

<!-- CART SUMMARY -->
<div class="section" id="summary"></div>

<!-- CUSTOMER DETAILS -->
<div class="section">
  <div>Name</div>
  <input id="name" class="input" placeholder="Enter name">

  <div>Phone</div>
  <input id="phone" class="input" placeholder="Enter phone">

  <div>Address</div>
  <input id="address" class="input" placeholder="Enter address">
</div>

<!-- BUTTON -->
<div class="section">
  <button class="btn" onclick="placeOrder()">Place Order</button>
</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
<script>

  const supabase = window.supabase.createClient(
  "https://zozzoqzryejpkbddzoyi.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpvenpvcXpyeWVqcGtiZGR6b3lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NDMwNzIsImV4cCI6MjA5MTUxOTA3Mn0.RYQqP5mVTtga4Y1XsBTRs_o58Bj2gSLZ5Se6YMak-UE"
);
  
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

// CALCULATE TOTAL
cart.forEach(c => {
  total += (c.total || 0) * (c.qty || 1);
});

// RENDER SUMMARY
document.getElementById("summary").innerHTML =
  cart.map(c => `
    <div style="margin-bottom:10px;">

      <div style="font-weight:600;">
        ${c.name} x${c.qty}
      </div>

      <div style="font-size:12px;color:#666;">
        ${c.variant && c.variant > 0 ? `• Variant ₹${c.variant}<br>` : ""}
        
        ${c.addons && c.addons.length > 0 
          ? c.addons.map(a => `• ${a.name} ₹${a.price}`).join("<br>") 
          : ""}
      </div>

      <div style="font-weight:bold;margin-top:4px;">
        ₹${(c.total || 0) * (c.qty || 1)}
      </div>

    </div>
  `).join("") +

  `<div style="font-weight:bold;margin-top:10px;">
    Total: ₹${total}
  </div>`;

// PLACE ORDER
async function placeOrder(){

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  if(!name || !phone || !address){
    alert("Fill all details");
    return;
  }

  // 1️⃣ CREATE MAIN ORDER
  const { data: orderData, error: orderError } = await supabase
    .from("orders")
    .insert([{
      customer_name: name,
      customer_phone: phone,
      customer_address: address,
      item_total: total,
      delivery_charge: 0,
      grand_total: total,
      payment_method: "COD",
      order_status: "pending"
    }])
    .select();

  if(orderError){
    console.log(orderError);
alert("Order failed ❌ " + orderError.message);
    return;
  }

  let orderId = orderData?.[0]?.id;

  // 2️⃣ INSERT ITEMS
  let itemsToInsert = cart.map(c => ({
    order_id: orderId,
    item_name: c.name,
    variant_name: c.variant > 0 ? "Variant ₹" + c.variant : "",
    quantity: c.qty,
    price: c.total
  }));

  const { error: itemError } = await supabase
    .from("order_items")
    .insert(itemsToInsert);

  if(itemError){
    console.log(itemError);
    alert("Items save failed ❌");
    return;
  }

  alert("Order Placed ✅");

  localStorage.removeItem("cart");

  window.location.href = "index.html";
}
  
</script>
  
</body>
</html>
