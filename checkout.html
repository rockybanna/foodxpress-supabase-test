<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Checkout</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family:sans-serif; margin:0; background:#f5f5f5; }

.header {
  background:#000;
  color:#fff;
  padding:12px;
}

.title { color:#ff9800; font-weight:bold; }

.section {
  background:#fff;
  margin:10px;
  padding:12px;
  border-radius:10px;
}

.input {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ddd;
}

.item {
  padding:6px 0;
  border-bottom:1px solid #eee;
}

.total {
  font-weight:bold;
  margin-top:10px;
}

.btn {
  background:#ff5722;
  color:#fff;
  border:none;
  width:100%;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">Checkout</div>
</div>

<!-- CART SUMMARY -->
<div class="section" id="summary"></div>

<!-- CUSTOMER DETAILS -->
<div class="section">
  <div>Name</div>
  <input id="name" class="input" placeholder="Enter name">

  <div>Phone</div>
  <input id="phone" class="input" placeholder="Enter phone">

  <div>Address</div>
  <input id="address" class="input" placeholder="Enter address">
</div>

<!-- BUTTON -->
<div class="section">
  <button class="btn" onclick="placeOrder()">Place Order</button>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

// RENDER SUMMARY
document.getElementById("summary").innerHTML =
  cart.map(c => {

    total += (c.total || 0) * (c.qty || 1);

    return `
      <div class="item">
        ${c.name} x${c.qty} - ₹${c.total * c.qty}
      </div>
    `;
  }).join("") +
  `<div class="total">Total: ₹${total}</div>`;


// PLACE ORDER
function placeOrder(){

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  if(!name || !phone || !address){
    alert("Fill all details");
    return;
  }

  // MOCK ORDER
  let order = {
    name,
    phone,
    address,
    cart,
    total
  };

  console.log(order);

  alert("Order Placed ✅");

  localStorage.removeItem("cart");

  window.location.href = "index.html";
}

</script>

</body>
</html>
